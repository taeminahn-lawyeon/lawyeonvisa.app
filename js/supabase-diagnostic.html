<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 연결 진단 - 법무법인 로연</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #ddd;
        }
        
        .status-card.loading {
            border-left-color: #ffa500;
        }
        
        .status-card.success {
            border-left-color: #28a745;
            background: #d4edda;
        }
        
        .status-card.error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        
        .status-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-content {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
        }
        
        .status-content pre {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 10px;
            border: 1px solid #ddd;
            font-size: 12px;
        }
        
        .icon {
            width: 20px;
            height: 20px;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .solution {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .solution h3 {
            color: #856404;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .solution ol {
            margin-left: 20px;
            color: #856404;
            font-size: 13px;
        }
        
        .solution ol li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Supabase 연결 진단</h1>
        <p class="subtitle">법무법인 로연 출입국이민지원센터 - 시스템 상태 확인</p>
        
        <div id="diagnosticResults">
            <div class="status-card loading">
                <div class="status-title">
                    <div class="spinner"></div>
                    진단을 시작합니다...
                </div>
                <div class="status-content">
                    Supabase 연결 상태를 확인하고 있습니다.
                </div>
            </div>
        </div>
        
        <button class="btn" onclick="runDiagnostic()" id="rerunBtn" disabled>
            다시 진단하기
        </button>
    </div>

    <!-- Supabase 클라이언트 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=20260613"></script>
    
    <script>
        let diagnosticResults = [];
        
        function addResult(title, content, status, solution = null) {
            diagnosticResults.push({ title, content, status, solution });
            renderResults();
        }
        
        function renderResults() {
            const container = document.getElementById('diagnosticResults');
            container.innerHTML = diagnosticResults.map(result => {
                const statusClass = result.status;
                const icon = statusClass === 'success' ? '✅' : 
                            statusClass === 'error' ? '❌' : 
                            statusClass === 'loading' ? '🔄' : 'ℹ️';
                
                return `
                    <div class="status-card ${statusClass}">
                        <div class="status-title">
                            ${icon} ${result.title}
                        </div>
                        <div class="status-content">
                            ${result.content}
                            ${result.solution ? `<div class="solution">${result.solution}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function runDiagnostic() {
            diagnosticResults = [];
            document.getElementById('rerunBtn').disabled = true;
            
            addResult('진단 시작', '시스템 연결 상태를 확인하고 있습니다...', 'loading');
            
            // 1️⃣ Supabase 클라이언트 로드 확인
            await new Promise(resolve => setTimeout(resolve, 500));
            
            if (typeof supabaseClient === 'undefined') {
                addResult(
                    '❌ Supabase 클라이언트 로드 실패',
                    'supabase-client.js 파일을 불러올 수 없습니다.',
                    'error',
                    '<h3>🔧 해결 방법:</h3><ol><li>브라우저 캐시를 완전히 삭제하세요 (Ctrl+Shift+Delete)</li><li>페이지를 새로고침하세요 (Ctrl+F5)</li></ol>'
                );
                document.getElementById('rerunBtn').disabled = false;
                return;
            }
            
            addResult(
                'Supabase 클라이언트 로드 완료',
                'supabase-client.js가 정상적으로 로드되었습니다.',
                'success'
            );
            
            // 2️⃣ 데이터베이스 연결 테스트
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('id')
                    .limit(1);
                
                if (error) {
                    // 에러 코드별 상세 분석
                    if (error.code === 'PGRST503' || error.message.includes('503')) {
                        addResult(
                            '❌ 데이터베이스 일시 정지됨',
                            `<pre>${JSON.stringify(error, null, 2)}</pre>`,
                            'error',
                            '<h3>🔧 해결 방법:</h3><ol><li><a href="https://supabase.com/dashboard" target="_blank">Supabase 대시보드</a>에 로그인하세요</li><li>"Resume project" 또는 "Restart project" 버튼을 클릭하세요</li><li>5~10분 기다린 후 다시 시도하세요</li></ol>'
                        );
                    } else if (error.code === '42P01') {
                        addResult(
                            '❌ 테이블이 존재하지 않음',
                            `<pre>${JSON.stringify(error, null, 2)}</pre>`,
                            'error',
                            '<h3>🔧 해결 방법:</h3><ol><li>Supabase Dashboard → SQL Editor로 이동</li><li>supabase-setup.sql 파일 내용을 실행하세요</li></ol>'
                        );
                    } else if (error.code === 'PGRST301' || error.message.includes('JWT')) {
                        addResult(
                            '❌ API Key 인증 실패',
                            `<pre>${JSON.stringify(error, null, 2)}</pre>`,
                            'error',
                            '<h3>🔧 해결 방법:</h3><ol><li>Supabase Dashboard → Settings → API로 이동</li><li>"anon public" 키를 복사하세요</li><li>js/supabase-client.js의 SUPABASE_ANON_KEY를 업데이트하세요</li></ol>'
                        );
                    } else {
                        addResult(
                            '❌ 데이터베이스 연결 오류',
                            `<pre>${JSON.stringify(error, null, 2)}</pre>`,
                            'error'
                        );
                    }
                } else {
                    addResult(
                        'profiles 테이블 접근 성공',
                        '데이터베이스 연결이 정상입니다.',
                        'success'
                    );
                }
            } catch (err) {
                addResult(
                    '❌ 네트워크 오류',
                    `<pre>${err.message}</pre>`,
                    'error',
                    '<h3>🔧 해결 방법:</h3><ol><li>인터넷 연결을 확인하세요</li><li>방화벽 또는 VPN 설정을 확인하세요</li></ol>'
                );
            }
            
            // 3️⃣ threads 테이블 접근 테스트
            try {
                const { data, error } = await supabaseClient
                    .from('threads')
                    .select('id, service_name, created_at')
                    .limit(5);
                
                if (error) {
                    addResult(
                        '❌ threads 테이블 접근 실패',
                        `<pre>${JSON.stringify(error, null, 2)}</pre>`,
                        'error'
                    );
                } else {
                    addResult(
                        'threads 테이블 접근 성공',
                        `총 ${data.length}개의 쓰레드를 확인했습니다.<br>${data.length > 0 ? '<pre>' + JSON.stringify(data, null, 2) + '</pre>' : '현재 등록된 쓰레드가 없습니다.'}`,
                        'success'
                    );
                }
            } catch (err) {
                addResult(
                    '❌ threads 테이블 쿼리 실패',
                    `<pre>${err.message}</pre>`,
                    'error'
                );
            }
            
            // 4️⃣ 로그인 세션 확인
            try {
                const session = await checkSession();
                
                if (session) {
                    addResult(
                        '로그인 세션 활성',
                        `현재 로그인된 사용자: ${session.user.email}`,
                        'success'
                    );
                    
                    // 내 쓰레드 개수 확인
                    const { data: myThreads } = await supabaseClient
                        .from('threads')
                        .select('id, service_name')
                        .eq('user_id', session.user.id);
                    
                    addResult(
                        '내 쓰레드 조회',
                        `${session.user.email} 계정의 쓰레드: ${myThreads?.length || 0}개${myThreads?.length > 0 ? '<pre>' + JSON.stringify(myThreads, null, 2) + '</pre>' : '<br><br>⚠️ 쓰레드가 없습니다. 서비스를 신청하고 결제를 완료하면 쓰레드가 생성됩니다.'}`,
                        myThreads?.length > 0 ? 'success' : 'error'
                    );
                } else {
                    addResult(
                        '로그인되지 않음',
                        '현재 로그인 세션이 없습니다.',
                        'error',
                        '<h3>🔧 해결 방법:</h3><ol><li><a href="index.html">홈페이지</a>로 이동하세요</li><li>Google 계정으로 로그인하세요</li></ol>'
                    );
                }
            } catch (err) {
                addResult(
                    '❌ 세션 확인 실패',
                    `<pre>${err.message}</pre>`,
                    'error'
                );
            }
            
            // 5️⃣ 최종 진단 결과
            const hasErrors = diagnosticResults.some(r => r.status === 'error');
            
            if (!hasErrors) {
                addResult(
                    '✅ 모든 검사 통과',
                    '시스템이 정상적으로 작동하고 있습니다!',
                    'success'
                );
            } else {
                addResult(
                    '⚠️ 문제 발견',
                    '위의 오류 메시지를 확인하고 제시된 해결 방법을 따라주세요.',
                    'error'
                );
            }
            
            document.getElementById('rerunBtn').disabled = false;
        }
        
        // 페이지 로드 시 자동 실행
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(runDiagnostic, 1000);
        });
    </script>
</body>
</html>
