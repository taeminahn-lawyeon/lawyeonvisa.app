<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 법무법인 로연</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    
    <!-- Supabase 라이브러리 (head에서 먼저 로드) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=20250119"></script>
    <script src="js/business-immigration.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: #F9FAFB;
            min-height: 100vh;
            color: #191F28;
        }

        /* 헤더 - 토스 스타일 */
        .header {
            background: white;
            padding: 20px 24px;
            color: #191F28;
            box-shadow: 0 1px 0 0 rgba(0, 0, 0, 0.05);
            border-bottom: none;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .admin-title h1 {
            font-size: 24px;
            font-weight: 700;
            color: #191F28;
            letter-spacing: -0.02em;
        }

        .admin-title p {
            font-size: 14px;
            color: #4E5968;
            margin-top: 0;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: #F2F4F6;
            border: none;
            color: #191F28;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .header-btn:hover {
            background: #E5E8EB;
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 통계 카드 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border: 1px solid #E5E8EB;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.08);
        }

        .stat-content p {
            font-size: 14px;
            color: #4E5968;
            font-weight: 500;
        }

        .stat-content h3 {
            font-size: 32px;
            font-weight: 700;
            color: #191F28;
            letter-spacing: -0.02em;
        }

        /* 필터 섹션 */
        .filter-section {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border: 1px solid #E5E8EB;
            margin-bottom: 24px;
        }

        .filter-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #191F28;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-item label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
        }

        .filter-item input,
        .filter-item select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .filter-item input:focus,
        .filter-item select:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .filter-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.primary {
            background: #3182F6;
            color: white;
        }

        .filter-btn.primary:hover {
            background: #1B64DA;
        }

        .filter-btn.secondary {
            background: #F2F4F6;
            color: #191F28;
        }

        .filter-btn.secondary:hover {
            background: #E5E8EB;
        }

        /* 쓰레드 테이블 - 토스 스타일 */
        .threads-section {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border: 1px solid #E5E8EB;
        }

        .threads-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #191F28;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .thread-count {
            font-size: 14px;
            color: #4E5968;
            font-weight: 500;
        }

        .threads-table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
        }

        .threads-table thead {
            background: #F9FAFB;
            border-top: 1px solid #E5E8EB;
            border-bottom: 1px solid #E5E8EB;
        }

        .threads-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #4E5968;
            font-size: 13px;
        }

        .threads-table td {
            padding: 16px;
            border-bottom: 1px solid #F2F4F6;
            font-size: 14px;
            color: #191F28;
        }

        .threads-table tr:hover {
            background: #F9FAFB;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-badge.payment {
            background: #E8F3FF;
            color: #1B64DA;
        }

        .status-badge.document {
            background: #FFF4E8;
            color: #F59638;
        }

        .status-badge.processing {
            background: #F0F4FF;
            color: #3182F6;
        }

        .status-badge.completed {
            background: #E8FAF0;
            color: #00A651;
        }

        .status-badge.archived {
            background: #F2F4F6;
            color: #6B7684;
        }

        .status-badge.received {
            background: #E8F3FF;
            color: #1B64DA;
        }

        .priority-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
        }

        .priority-badge.urgent {
            background: #fee2e2;
            color: #991b1b;
        }

        .priority-badge.high {
            background: #fed7aa;
            color: #9a3412;
        }

        .priority-badge.normal {
            background: #e0e7ff;
            color: #3730a3;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 3px;
        }

        .action-btn.view {
            background: #3182F6;
            color: white;
        }

        .action-btn.view:hover {
            background: #1B64DA;
        }

        .action-btn.edit {
            background: #F2F4F6;
            color: #191F28;
        }

        .action-btn.edit:hover {
            background: #E5E8EB;
        }

        .action-btn.delete {
            background: #FEE2E2;
            color: #DC2626;
        }

        .action-btn.delete:hover {
            background: #FECACA;
        }

        /* 일괄 선택 체크박스 */
        .row-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3182F6;
        }

        .threads-table th:first-child,
        .threads-table td:first-child {
            width: 40px;
            text-align: center;
        }

        /* 일괄 작업 바 */
        .bulk-action-bar {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #191F28;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 999;
            align-items: center;
            gap: 20px;
        }

        .bulk-action-bar.active {
            display: flex;
        }

        .bulk-action-bar .selected-count {
            font-weight: 600;
            font-size: 14px;
        }

        .bulk-action-bar .bulk-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .bulk-action-bar .bulk-btn.primary {
            background: #3182F6;
            color: white;
        }

        .bulk-action-bar .bulk-btn.primary:hover {
            background: #1B64DA;
        }

        .bulk-action-bar .bulk-btn.secondary {
            background: #4E5968;
            color: white;
        }

        .bulk-action-bar .bulk-btn.secondary:hover {
            background: #6B7684;
        }

        .bulk-action-bar select {
            padding: 10px 16px;
            border: 1px solid #4E5968;
            border-radius: 8px;
            font-size: 14px;
            background: #2D3540;
            color: white;
            cursor: pointer;
        }

        /* 모달 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 22px;
            color: #2c3e50;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn.secondary {
            background: #e0e0e0;
            color: #555;
        }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* 탭 UI 스타일 - 토스 디자인 */
        .tabs-container {
            background: white;
            padding: 0 24px;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border: 1px solid #E5E8EB;
            border-bottom: none;
            margin-bottom: 0;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #E5E8EB;
        }

        .tab {
            padding: 16px 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            color: #6B7684;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            background: none;
            border: none;
            border-radius: 0;
            margin-bottom: -2px;
        }

        .tab:hover {
            color: #191F28;
            background: #F9FAFB;
        }

        .tab.active {
            color: #3182F6;
            border-bottom-color: #3182F6;
            background: white;
        }

        .tab .badge {
            display: inline-block;
            background: #F04452;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 고객 명단 테이블 스타일 - 토스 디자인 */
        .customers-table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
        }

        .customers-table thead {
            background: #F9FAFB;
            border-top: 1px solid #E5E8EB;
            border-bottom: 1px solid #E5E8EB;
        }

        .customers-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #4E5968;
            font-size: 13px;
        }

        .customers-table td {
            padding: 16px;
            border-bottom: 1px solid #F2F4F6;
            font-size: 14px;
            color: #191F28;
        }

        .customers-table tr:hover {
            background: #F9FAFB;
        }

        .visa-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            background: #E8F3FF;
            color: #1B64DA;
        }

        .expiry-warning {
            color: #F04452;
            font-weight: 600;
        }

        .expiry-normal {
            color: #00A651;
        }

        /* 고객 필터 - 토스 디자인 */
        .customer-filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: #F9FAFB;
            border-radius: 12px;
            border: 1px solid #E5E8EB;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }

            .threads-table, .customers-table {
                display: block;
                overflow-x: auto;
            }

            .threads-section h2 {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab {
                padding: 12px 20px;
                font-size: 14px;
            }

            .customer-filter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="admin-title">
                <h1>관리자 대시보드</h1>
                <p>법무법인 로연 출입국이민지원센터</p>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='index.html'" style="background: #10B981;">
                    서비스 신청
                </button>
                <button class="header-btn" onclick="location.reload()">
                    새로고침
                </button>
                <button class="header-btn" onclick="logout()">
                    로그아웃
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 통계 카드 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-content">
                    <p>전체 고객</p>
                    <h3 id="totalCustomers">0</h3>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-content">
                    <p>진행 중 쓰레드</p>
                    <h3 id="activeThreads">0</h3>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-content">
                    <p>긴급 케이스</p>
                    <h3 id="urgentCases">0</h3>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-content">
                    <p>이번 달 매출 (합계금액)</p>
                    <h3 id="monthlyRevenue">₩0</h3>
                </div>
            </div>

            <div class="stat-card" id="systemErrorsCard" style="border-left:4px solid #f03e3e;">
                <div class="stat-content">
                    <p><i class="fa-solid fa-triangle-exclamation" style="color:#f03e3e;"></i> <span data-i18n="admin.nav.system_errors">시스템 오류</span> <span id="system-errors-badge" class="nav-badge nav-badge-hidden">0</span></p>
                    <h3 id="systemErrorsCount" style="color:#f03e3e;">0</h3>
                </div>
            </div>
        </div>

        <!-- 필터 섹션 -->
        <div class="filter-section">
            <h2>필터</h2>
            <div class="filter-grid">
                <div class="filter-item">
                    <label>고객명</label>
                    <input type="text" id="filterName" placeholder="이름 검색...">
                </div>
                <div class="filter-item">
                    <label>서비스명</label>
                    <input type="text" id="filterService" placeholder="서비스 검색...">
                </div>
                <div class="filter-item">
                    <label>상태</label>
                    <select id="filterStatus">
                        <option value="">전체</option>
                        <option value="received">신청 접수</option>
                        <option value="completed">완료</option>
                        <option value="archived">보관</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>우선순위</label>
                    <select id="filterPriority">
                        <option value="">전체</option>
                        <option value="urgent">긴급</option>
                        <option value="high">높음</option>
                        <option value="normal">보통</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>진행 형태</label>
                    <select id="filterServiceType">
                        <option value="">전체</option>
                        <option value="consulting">자문</option>
                        <option value="civil">민원</option>
                        <option value="litigation">소송</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>요청 유형</label>
                    <select id="filterRequestType">
                        <option value="">전체</option>
                        <option value="general">일반</option>
                        <option value="business_immigration">사업이민</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button class="filter-btn primary" onclick="applyFilters()">
                    검색
                </button>
                <button class="filter-btn secondary" onclick="resetFilters()">
                    초기화
                </button>
            </div>
        </div>

        <!-- 탭 UI -->
        <div class="tabs-container">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('threads')">
                    쓰레드 목록
                </button>
                <button class="tab" onclick="switchTab('customers')">
                    고객 명단
                </button>
                <button class="tab" onclick="switchTab('newMembers')">
                    <i class="fas fa-user-plus"></i> 신규 회원 <span id="newMemberBadge" class="badge" style="display: none;">0</span>
                </button>
            </div>
        </div>

        <!-- 쓰레드 탭 -->
        <div id="threadsTab" class="tab-content active threads-section">
            <h2>
                <span>쓰레드 목록</span>
                <span class="thread-count" id="threadCount">총 0건</span>
            </h2>
            <div id="threadsTableContainer">
                <!-- 테이블이 여기에 동적으로 생성됨 -->
            </div>
        </div>

        <!-- 고객 명단 탭 -->
        <div id="customersTab" class="tab-content threads-section">
            <h2>
                <span>고객 명단</span>
                <span class="thread-count" id="customerCount">총 0명</span>
            </h2>
            
            <!-- 고객 필터 -->
            <div class="customer-filter-grid">
                <div class="filter-item">
                    <label>고객명</label>
                    <input type="text" id="customerFilterName" placeholder="이름 검색...">
                </div>
                <div class="filter-item">
                    <label>소속 단체</label>
                    <select id="customerFilterOrg">
                        <option value="">전체</option>
                        <option value="lawyeon">법무법인 로연</option>
                        <option value="chosun">조선대학교</option>
                        <option value="kdu">극동대학교</option>

    <script>
        // 전역 변수
        let allThreads = [];
        let filteredThreads = [];
        let currentThreadId = null;
        let selectedThreadIds = new Set();

        // 진행 단계 정의
        const STAGES = {
            consulting: [
                '결제 및 서류 안내',
                '서류 제출',
                '서류 검토',
                '의견서 전달'
            ],
            civil: [
                '결제 및 서류 안내',
                '서류 제출',
                '서류 검토 및 보완',
                '출입국 신청 완료',
                '보완 요청 대응',
                '완료'
            ],
            litigation: [
                '상담 진행',
                '결제 및 서류 안내',
                '서류 제출',
                '소송 대리',
                '완료'
            ]
        };

        // 상태 라벨
        const STATUS_LABELS = {
            'received': '신청 접수',
            'completed': '완료',
            'archived': '보관',
            // 기존 상태 호환
            'payment': '신청 접수',
            'document': '신청 접수',
            'processing': '신청 접수'
        };

        // 서비스 타입 라벨
        const SERVICE_TYPE_LABELS = {
            'consulting': '자문',
            'civil': '민원',
            'litigation': '소송'
        };

        // 페이지 로드 시 초기화
        window.addEventListener('DOMContentLoaded', async function() {
            // 관리자 권한 확인
            const hasAccess = await checkAdminAccess();
            
            if (!hasAccess) return;

            // 데이터 로드
            loadDashboardData();

            // 시스템 오류 카운트 (business-immigration.js의 refreshSystemErrorsBadge가
            // 헤더 뱃지를 갱신하고, 여기서는 통계 카드의 숫자도 함께 갱신)
            try {
                const { count } = await supabaseClient
                    .from('system_errors')
                    .select('id', { count: 'exact', head: true })
                    .is('resolved_at', null);
                const el = document.getElementById('systemErrorsCount');
                if (el) el.textContent = String(count || 0);
            } catch (_) { /* 실패 시 0 유지 */ }
        });

        // 관리자 권한 확인 (Supabase 세션 기반 + DB role 검증)
        async function checkAdminAccess() {
            const ADMIN_ROLES = ['super_admin', 'admin', 'staff'];

            // 1. Supabase 세션 확인
            const session = await checkSession();

            if (session && session.user) {
                // 2. DB에서 실제 role 확인 (세션만으로는 부족)
                try {
                    const { data: profile, error } = await supabaseClient
                        .from('profiles')
                        .select('role')
                        .eq('id', session.user.id)
                        .single();

                    if (!error && profile && ADMIN_ROLES.includes(profile.role)) {
                        // sessionStorage 동기화 (탭 닫았다 열 때 sessionStorage 복원)
                        sessionStorage.setItem('adminLoggedIn', 'true');
                        sessionStorage.setItem('adminId', session.user.email);
                        sessionStorage.setItem('adminRole', profile.role);
                        return true;
                    }

                    // admins 테이블에서도 확인
                    const { data: admin, error: adminError } = await supabaseClient
                        .from('admins')
                        .select('role')
                        .eq('email', session.user.email)
                        .single();

                    if (!adminError && admin && ADMIN_ROLES.includes(admin.role)) {
                        // sessionStorage 동기화
                        sessionStorage.setItem('adminLoggedIn', 'true');
                        sessionStorage.setItem('adminId', session.user.email);
                        sessionStorage.setItem('adminRole', admin.role);
                        return true;
                    }
                } catch (e) {
                    console.error('Role verification error:', e);
                }

                // 세션은 있지만 admin role이 아닌 경우
                alert('관리자 권한이 없습니다. 접근이 거부되었습니다.');
                location.href = 'index.html';
                return false;
            }

            // 3. sessionStorage 폴백 - role도 함께 검증
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                const storedRole = sessionStorage.getItem('adminRole');
                if (ADMIN_ROLES.includes(storedRole)) {
                    // sessionStorage 기반 접근은 제한적으로 허용하되 경고
                    console.warn('Admin access via sessionStorage - Supabase session recommended');
                    return true;
                }
            }

            // 둘 다 없으면 로그인 페이지로 이동
            alert('로그인이 필요합니다.');
            location.href = 'admin-login.html';
            return false;
        }

        // 대시보드 데이터 로드
        async function loadDashboardData() {
            try {
                // Supabase에서 모든 쓰레드 + 프로필 정보 가져오기
                let threads = null;
                let error = null;

                // 1차 시도: 쓰레드 + 프로필 조인
                const joinResult = await supabaseClient
                    .from('threads')
                    .select(`
                        *,
                        profiles!left (
                            name,
                            email,
                            phone
                        )
                    `)
                    .order('created_at', { ascending: false });

                if (joinResult.error) {
                    console.warn('⚠️ 프로필 조인 실패, 쓰레드만 로드:', joinResult.error.message);
                    // 2차 시도: 조인 없이 쓰레드만 로드 (FK 관계 문제 대비)
                    const fallbackResult = await supabaseClient
                        .from('threads')
                        .select('*')
                        .order('created_at', { ascending: false });

                    threads = fallbackResult.data;
                    error = fallbackResult.error;
                } else {
                    threads = joinResult.data;
                    error = null;
                }

                if (error) {
                    console.error('❌ 쓰레드 로드 오류:', error);
                    allThreads = [];
                } else {
                    // console.log('✅ 쓰레드 로드 성공:', threads.length, '개');
                    
                    // 데이터 포맷 변환
                    allThreads = threads.map(thread => {
                        // 긴급 케이스 자동 판별
                        let priority = thread.priority || 'normal';
                        if (thread.service_name && 
                            (thread.service_name.includes('긴급 구제') || 
                             thread.service_name.includes('사전 진단') ||
                             thread.service_name.includes('변호사 전담 대응'))) {
                            priority = 'urgent';
                        }
                        
                        // 서비스 타입 결정 (consulting, civil, litigation)
                        let serviceType = thread.service_type || 'civil'; // 기본값은 민원
                        if (thread.is_consulting) {
                            serviceType = 'consulting';
                        }

                        const serviceName = thread.service_name || '';

                        // 자문 관련 서비스 판별
                        if (serviceName.includes('자문') ||
                            serviceName.includes('Pre-diagnosis') ||
                            serviceName.includes('사전 진단') ||
                            serviceName.includes('Consultation') ||
                            serviceName.includes('상담')) {
                            serviceType = 'consulting';
                        }

                        // 소송 관련 서비스 판별
                        if (serviceName.includes('소송') ||
                            serviceName.includes('분쟁') ||
                            serviceName.includes('Dispute') ||
                            serviceName.includes('Litigation')) {
                            serviceType = 'litigation';
                        }

                        return {
                            id: thread.id,
                            customer_name: thread.profiles?.name || '알 수 없음',
                            customer_email: thread.profiles?.email || '',
                            customer_phone: thread.profiles?.phone || '',
                            service_name: thread.service_name,
                            status: thread.status,
                            priority: priority,
                            amount: thread.amount || 0,
                            government_fee: thread.government_fee || 0,
                            order_id: thread.order_id,
                            payment_id: thread.payment_id,
                            created_at: new Date(thread.created_at).getTime(),
                            updated_at: new Date(thread.updated_at).getTime(),
                            organization: thread.organization,
                            is_consulting: thread.is_consulting || false,
                            service_type: serviceType,
                            current_stage: thread.current_stage || 1
                        };
                    });
                    
                    // console.log('📊 변환된 쓰레드 데이터:', allThreads);
                }
                
                filteredThreads = [...allThreads];
                
                updateStatistics();
                renderThreadsTable();
                
                // 신규 회원 배지 업데이트
                updateNewMemberBadge();
            } catch (error) {
                console.error('대시보드 데이터 로드 오류:', error);
                alert('데이터를 불러오는 중 오류가 발생했습니다.');
            }
        }

        // 신규 회원 배지만 업데이트 (전체 데이터 로드 없이)
        async function updateNewMemberBadge() {
            try {
                const sevenDaysAgo = new Date();
                sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                
                const { count, error } = await supabaseClient
                    .from('profiles')
                    .select('*', { count: 'exact', head: true })
                    .gte('created_at', sevenDaysAgo.toISOString());
                
                if (!error && count > 0) {
                    const badge = document.getElementById('newMemberBadge');
                    badge.textContent = count;
                    badge.style.display = 'inline-block';
                }
            } catch (error) {
                console.error('신규 회원 배지 업데이트 오류:', error);
            }
        }



        // 통계 업데이트
        function updateStatistics() {
            // 전체 고객 (중복 제거)
            const uniqueCustomers = new Set(allThreads.map(t => t.customer_name));
            document.getElementById('totalCustomers').textContent = uniqueCustomers.size;
            
            // 진행 중 쓰레드 (completed, archived 제외)
            const activeThreads = allThreads.filter(t => 
                !['completed', 'archived'].includes(t.status)
            );
            document.getElementById('activeThreads').textContent = activeThreads.length;
            
            // 긴급 케이스 (긴급 구제, 사전 진단, 변호사 전담 대응 포함)
            const urgentCases = allThreads.filter(t => 
                t.priority === 'urgent' || 
                (t.service_name && t.service_name.includes('긴급 구제')) || 
                (t.service_name && t.service_name.includes('사전 진단')) ||
                (t.service_name && t.service_name.includes('변호사 전담 대응'))
            );
            document.getElementById('urgentCases').textContent = urgentCases.length;
            
            // 이번 달 매출 (모든 상태, 부가세 포함 합계금액)
            // 주의: 출입국 수수료 포함
            const now = new Date();
            const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            const monthlyRevenue = allThreads
                .filter(t => 
                    t.created_at >= thisMonthStart &&
                    t.amount > 0
                )
                .reduce((sum, t) => {
                    // 부가세 포함 총 금액 (합계금액)
                    return sum + (t.amount || 0);
                }, 0);
            
            document.getElementById('monthlyRevenue').textContent = 
                '₩' + monthlyRevenue.toLocaleString();
        }

        // 쓰레드 테이블 렌더링
        function renderThreadsTable() {
            const container = document.getElementById('threadsTableContainer');
            document.getElementById('threadCount').textContent = `총 ${filteredThreads.length}건`;

            // 선택 상태 초기화
            selectedThreadIds.clear();
            updateBulkActionBar();

            if (filteredThreads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>검색 결과가 없습니다.</p>
                    </div>
                `;
                return;
            }
            
            let tableHTML = `
                <table class="threads-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" class="row-checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
                            <th>고객명</th>
                            <th>연락처</th>
                            <th>서비스명</th>
                            <th>협약단체</th>
                            <th>주문번호</th>
                            <th>상태</th>
                            <th>진행단계</th>
                            <th>금액</th>
                            <th>신청일</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filteredThreads.forEach(thread => {
                // 상태 라벨 (새로운 3단계 시스템, 기존 상태 호환)
                const statusLabel = STATUS_LABELS[thread.status] || '신청 접수';

                // 상태 배지 클래스 (새 상태로 변환)
                let statusClass = thread.status;
                if (['payment', 'document', 'processing'].includes(thread.status)) {
                    statusClass = 'received';
                }

                const priorityLabel = {
                    'normal': '보통',
                    'high': '높음',
                    'urgent': '긴급'
                }[thread.priority];

                // 연락처 포맷팅
                const phone = thread.customer_phone || '-';
                const phoneDisplay = phone !== '-'
                    ? `<a href="tel:${phone}" style="color: #3182F6; text-decoration: none;">${phone}</a>`
                    : '-';

                // 주문번호 표시 (order_id 또는 payment_id)
                const orderDisplay = thread.order_id
                    ? `<code style="font-size: 11px; background: #f3f4f6; padding: 2px 6px; border-radius: 4px;">${thread.order_id}</code>`
                    : '-';

                // 협약단체 표시
                const orgLabels = {
                    'chosun': { name: '조선대', bg: '#1B3A7B' },
                    'kdu': { name: '극동대', bg: '#003366' }
                };
                const orgInfo = orgLabels[thread.organization];
                const organizationBadge = orgInfo
                    ? `<span class="org-badge" style="background:${orgInfo.bg}; color:white; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; display:inline-block;">${orgInfo.name}</span>`
                    : `<span style="color: #9CA3AF; font-size: 12px;">일반</span>`;

                // 진행 단계 표시 (자문: 4단계, 민원: 6단계, 소송: 5단계)
                const serviceType = thread.service_type || 'civil';
                const stages = STAGES[serviceType] || STAGES.civil;
                const currentStage = Math.min(thread.current_stage || 1, stages.length);
                const totalStages = stages.length;
                const stageName = stages[currentStage - 1] || stages[0];
                const serviceTypeLabel = SERVICE_TYPE_LABELS[serviceType] || '민원';

                // 서비스 타입별 색상
                const typeColors = {
                    'consulting': { bg: '#FEF3C7', color: '#D97706' },
                    'civil': { bg: '#EBF4FF', color: '#1B64DA' },
                    'litigation': { bg: '#FCE7F3', color: '#BE185D' }
                };
                const typeColor = typeColors[serviceType] || typeColors.civil;

                const stageDisplay = `<span style="background: ${typeColor.bg}; color: ${typeColor.color}; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600;">${currentStage}/${totalStages}</span> <span style="color: #6B7684; font-size: 11px;">${serviceTypeLabel}</span>`;

                tableHTML += `
                    <tr data-thread-id="${thread.id}" data-service-type="${serviceType}">
                        <td><input type="checkbox" class="row-checkbox" onchange="toggleRowSelect(this, '${thread.id}')"></td>
                        <td>
                            <div><strong>${thread.customer_name}</strong></div>
                            <div style="font-size: 12px; color: #6B7280;">${thread.customer_email}</div>
                        </td>
                        <td>${phoneDisplay}</td>
                        <td>${thread.service_name}</td>
                        <td>${organizationBadge}</td>
                        <td>${orderDisplay}</td>
                        <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                        <td>${stageDisplay}</td>

        // 필터 적용
        function applyFilters() {
            const nameFilter = document.getElementById('filterName').value.toLowerCase();
            const serviceFilter = document.getElementById('filterService').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const priorityFilter = document.getElementById('filterPriority').value;
            const serviceTypeFilter = document.getElementById('filterServiceType').value;
            const requestTypeFilter = document.getElementById('filterRequestType')?.value || '';

            filteredThreads = allThreads.filter(thread => {
                if (nameFilter && !thread.customer_name.toLowerCase().includes(nameFilter)) return false;
                if (serviceFilter && !thread.service_name.toLowerCase().includes(serviceFilter)) return false;

                // 요청 유형 필터 (일반 / 사업이민) — 기존 status 필터 적용 시 request_type='general'로
                // 제한해 기존 경로 결과 보존(섹션 14-2-4). 사업이민은 별도 상태 체계 사용.
                const threadRequestType = thread.request_type || 'general';
                if (requestTypeFilter) {
                    if (threadRequestType !== requestTypeFilter) return false;
                }

                // 상태 필터 (기존 상태도 호환) — 사업이민 쓰레드에는 적용하지 않음
                if (statusFilter && threadRequestType === 'general') {
                    const normalizedStatus = ['payment', 'document', 'processing'].includes(thread.status) ? 'received' : thread.status;
                    if (normalizedStatus !== statusFilter) return false;
                }

                if (priorityFilter && thread.priority !== priorityFilter) return false;

                // 서비스 유형 필터 (자문/민원/소송)
                if (serviceTypeFilter) {
                    if (thread.service_type !== serviceTypeFilter) return false;
                }
                return true;
            });

            renderThreadsTable();
        }

        // 필터 초기화
        function resetFilters() {
            document.getElementById('filterName').value = '';
            document.getElementById('filterService').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterPriority').value = '';
            document.getElementById('filterServiceType').value = '';
            const rt = document.getElementById('filterRequestType');
            if (rt) rt.value = '';

            filteredThreads = [...allThreads];
            renderThreadsTable();
        }

        function toggleSelectAll(checkbox) {
            const rowCheckboxes = document.querySelectorAll('tbody .row-checkbox');
            rowCheckboxes.forEach(cb => {
                cb.checked = checkbox.checked;
                const threadId = cb.closest('tr').dataset.threadId;
                if (checkbox.checked) {
                    selectedThreadIds.add(threadId);
                } else {
                    selectedThreadIds.delete(threadId);
                }
            });
            updateBulkActionBar();
        }

        // 개별 행 선택/해제
        function toggleRowSelect(checkbox, threadId) {
            if (checkbox.checked) {
                selectedThreadIds.add(threadId);
            } else {
                selectedThreadIds.delete(threadId);
            }

            // 전체 선택 체크박스 상태 업데이트
            const rowCheckboxes = document.querySelectorAll('tbody .row-checkbox');

        // 일괄 상태 변경
        async function bulkChangeStatus() {
            const newStatus = document.getElementById('bulkStatusSelect').value;

            if (!newStatus) {
                alert('변경할 상태를 선택해주세요.');
                return;
            }

            if (selectedThreadIds.size === 0) {
                alert('선택된 항목이 없습니다.');
                return;
            }

            const statusLabel = STATUS_LABELS[newStatus];
            const confirmMsg = `선택된 ${selectedThreadIds.size}건의 쓰레드를 "${statusLabel}"(으)로 변경하시겠습니까?`;

            if (!confirm(confirmMsg)) return;

            try {
                const threadIds = Array.from(selectedThreadIds);

                const { error } = await supabaseClient
                    .from('threads')
                    .update({
                        status: newStatus,
                        updated_at: new Date().toISOString()
                    })
                    .in('id', threadIds);

                if (error) throw error;

                // 로컬 데이터 업데이트
                threadIds.forEach(id => {
                    const thread = allThreads.find(t => t.id === id);
                    if (thread) {
                        thread.status = newStatus;
                    }
                });

                alert(`${selectedThreadIds.size}건의 상태가 변경되었습니다.`);
                clearSelection();
                renderThreadsTable();

            } catch (error) {
                console.error('일괄 상태 변경 오류:', error);
                alert('상태 변경 중 오류가 발생했습니다.');
            }
        }

        // 쓰레드 상세보기
        function viewThread(threadId) {
            // 관리자 전용 쓰레드 페이지로 이동
            window.location.href = `admin-thread.html?id=${threadId}`;
        }

        // 쓰레드 삭제
        async function deleteThread(threadId) {
            const thread = allThreads.find(t => t.id === threadId);
            const threadName = thread ? `${thread.customer_name} - ${thread.service_name}` : threadId;

            if (!confirm(`정말 이 쓰레드를 삭제하시겠습니까?\n\n"${threadName}"\n\n⚠️ 삭제된 데이터는 복구할 수 없습니다.`)) {
                return;
            }

            try {
                // 먼저 해당 쓰레드의 메시지들 삭제
                const { error: messagesError } = await supabaseClient
                    .from('messages')
                    .delete()
                    .eq('thread_id', threadId);

                if (messagesError) {
                    console.warn('메시지 삭제 오류 (무시):', messagesError);
                }

                // 쓰레드 삭제
                const { error } = await supabaseClient
                    .from('threads')
                    .delete()
                    .eq('id', threadId);

                if (error) throw error;

                // 로컬 배열에서도 제거
                allThreads = allThreads.filter(t => t.id !== threadId);
                filteredThreads = filteredThreads.filter(t => t.id !== threadId);

                alert('쓰레드가 삭제되었습니다.');
                updateStatistics();
                renderThreadsTable();

            } catch (error) {
                console.error('쓰레드 삭제 실패:', error);
                alert('삭제 중 오류가 발생했습니다: ' + error.message);
            }
        }

        // 일괄 삭제
        async function bulkDeleteThreads() {
            if (selectedThreadIds.size === 0) {
                alert('선택된 항목이 없습니다.');
                return;
            }

            const confirmMsg = `선택된 ${selectedThreadIds.size}건의 쓰레드를 정말 삭제하시겠습니까?\n\n⚠️ 삭제된 데이터는 복구할 수 없습니다.`;

            if (!confirm(confirmMsg)) return;

            try {
                const threadIds = Array.from(selectedThreadIds);

                // 먼저 해당 쓰레드들의 메시지들 삭제
                const { error: messagesError } = await supabaseClient
                    .from('messages')
                    .delete()
                    .in('thread_id', threadIds);

                if (messagesError) {
                    console.warn('메시지 삭제 오류 (무시):', messagesError);
                }

                // 쓰레드들 삭제
                const { error } = await supabaseClient
                    .from('threads')
                    .delete()
                    .in('id', threadIds);

                if (error) throw error;

                // 로컬 배열에서도 제거
                allThreads = allThreads.filter(t => !threadIds.includes(t.id));
                filteredThreads = filteredThreads.filter(t => !threadIds.includes(t.id));

                alert(`${selectedThreadIds.size}건의 쓰레드가 삭제되었습니다.`);
                clearSelection();
                updateStatistics();
                renderThreadsTable();

            } catch (error) {
                console.error('일괄 삭제 오류:', error);
                alert('삭제 중 오류가 발생했습니다: ' + error.message);
            }
        }

        // 진행 단계 옵션 업데이트
        function updateStageOptions(serviceType) {
            const stageSelect = document.getElementById('newStage');
            const stageHint = document.getElementById('stageHint');

            if (!serviceType) {
                serviceType = document.getElementById('newServiceType').value;
            }

            const stages = STAGES[serviceType] || STAGES.civil;
            stageSelect.innerHTML = '';

            stages.forEach((stage, index) => {
                const option = document.createElement('option');
                option.value = index + 1;
                option.textContent = `${index + 1}단계: ${stage}`;
                stageSelect.appendChild(option);
            });

            // 힌트 업데이트
            const hints = {
                'consulting': '자문: 결제 및 서류 안내 > 서류 제출 > 서류 검토 > 의견서 전달',
                'civil': '민원: 결제 및 서류 안내 > 서류 제출 > 서류 검토 및 보완 > 출입국 신청 완료 > 보완 요청 대응 > 완료',
                'litigation': '소송: 상담 진행 > 결제 및 서류 안내 > 서류 제출 > 소송 대리 > 완료'
            };
            stageHint.textContent = hints[serviceType] || '';
        }

        // 상태 변경 모달 열기
        function openStatusModal(threadId) {
            currentThreadId = threadId;
            const thread = allThreads.find(t => t.id === threadId);

            if (thread) {
                // 상태 정규화 (기존 상태를 새 상태로 변환)
                let normalizedStatus = thread.status;
                if (['payment', 'document', 'processing'].includes(thread.status)) {
                    normalizedStatus = 'received';
                }

                document.getElementById('newStatus').value = normalizedStatus;
                document.getElementById('newPriority').value = thread.priority || 'normal';
                document.getElementById('newServiceType').value = thread.service_type || 'civil';
                document.getElementById('statusMemo').value = '';

                // 서비스 타입에 맞는 단계 옵션 생성
                updateStageOptions(thread.service_type || 'civil');

                // 현재 단계 선택
                document.getElementById('newStage').value = thread.current_stage || 1;

                document.getElementById('statusModal').classList.add('active');
            }
        }

        // 쓰레드 상태 업데이트
        async function updateThreadStatus() {
            if (!currentThreadId) {
                console.error('currentThreadId가 없습니다');
                return;
            }

            const newStatus = document.getElementById('newStatus').value;
            const newPriority = document.getElementById('newPriority').value;
            const newServiceType = document.getElementById('newServiceType').value;
            const newStage = parseInt(document.getElementById('newStage').value);
            const memo = document.getElementById('statusMemo').value;

            // console.log('상태 업데이트 시작:', { threadId: currentThreadId, newStatus, newPriority, newServiceType, newStage, memo });

            try {
                // Supabase에 실제 업데이트 (데이터베이스에 존재하는 필드만)
                const { data, error } = await supabaseClient
                    .from('threads')
                    .update({
                        status: newStatus,
                        priority: newPriority,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', currentThreadId)
                    .select()
                    .single();

                if (error) {
                    console.error('Supabase 업데이트 에러:', error);
                    throw error;
                }

                // console.log('Supabase 상태 업데이트 성공:', data);

                // 로컬 배열도 업데이트 (UI 표시용 - DB에 없는 필드 포함)
                const thread = allThreads.find(t => t.id === currentThreadId);
                if (thread) {
                    thread.status = newStatus;
                    thread.priority = newPriority;
                    thread.updated_at = new Date().toISOString();
                }

                updateStatistics();
                applyFilters();
                closeStatusModal();

                alert('쓰레드 상태가 업데이트되었습니다!');

                // 데이터 새로고침
                setTimeout(() => {
                    loadDashboardData();
                }, 500);

            } catch (error) {
                console.error('쓰레드 상태 업데이트 실패:', error);
                alert('상태 업데이트 중 오류가 발생했습니다: ' + error.message);
            }
        }

        // 탭 전환 함수
        function switchTab(tabName) {
            // 탭 버튼 활성화
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.closest('.tab').classList.add('active');
            
            // 탭 콘텐츠 표시
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            if (tabName === 'threads') {
                document.getElementById('threadsTab').classList.add('active');
            } else if (tabName === 'customers') {
                document.getElementById('customersTab').classList.add('active');
                loadCustomersData();
            } else if (tabName === 'newMembers') {
                document.getElementById('newMembersTab').classList.add('active');
                loadNewMembersData();

                        <td>${phoneLink}</td>
                        <td>${customer.organization || '-'}</td>
                        <td>${customer.visa_type ? `<span class="visa-badge">${customer.visa_type}</span>` : '-'}</td>
                        <td>${customer.nationality || '-'}</td>
                        <td class="${expiryClass}">${expiryDisplay}</td>
                        <td>${new Date(customer.created_at).toLocaleDateString('ko-KR')}</td>
                    </tr>
                `;
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            container.innerHTML = tableHTML;
        }

        // 고객 필터 적용
        function applyCustomerFilters() {
            const nameFilter = document.getElementById('customerFilterName').value.toLowerCase();
            const orgFilter = document.getElementById('customerFilterOrg').value;
            const visaFilter = document.getElementById('customerFilterVisa').value;
            const nationalityFilter = document.getElementById('customerFilterNationality').value;
            const expiryFilter = document.getElementById('customerFilterExpiry').value;
            
            filteredCustomers = allCustomers.filter(customer => {
                if (nameFilter && !customer.name?.toLowerCase().includes(nameFilter)) return false;
                if (orgFilter && customer.organization !== orgFilter) return false;
                if (visaFilter && customer.visa_type !== visaFilter) return false;
                if (nationalityFilter && customer.nationality !== nationalityFilter) return false;
                
                if (expiryFilter && customer.stay_expiry) {
                    const stayExpiry = new Date(customer.stay_expiry);
                    const now = new Date();
                    const diffDays = Math.floor((stayExpiry - now) / (1000 * 60 * 60 * 24));
                    
                    if (expiryFilter === 'expired' && diffDays >= 0) return false;
                    if (expiryFilter === '30days' && (diffDays < 0 || diffDays > 30)) return false;
                    if (expiryFilter === '60days' && (diffDays < 0 || diffDays > 60)) return false;
                    if (expiryFilter === '90days' && (diffDays < 0 || diffDays > 90)) return false;
                }
                
                return true;
            });
            
            renderCustomersTable();
        }

        // 고객 필터 초기화
        function resetCustomerFilters() {
            document.getElementById('customerFilterName').value = '';
            document.getElementById('customerFilterOrg').value = '';
            document.getElementById('customerFilterVisa').value = '';
            document.getElementById('customerFilterNationality').value = '';
            document.getElementById('customerFilterExpiry').value = '';
            
            filteredCustomers = [...allCustomers];
            renderCustomersTable();
        }

        // 페이지 로드 시 - 권한 체크는 로그인 페이지에서 이미 완료됨
        // console.log('관리자 대시보드 로드 완료');
    </script>
</body>
</html>
