<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lawyeon — Living Legal Document (test_hook_02)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #f8f4ea;
    --ink: #1a1a1a;
    --stamp: #c4302b;

    /* 9:16 shortform safe zone: y = 220 ~ 1470 (height 1250) */
    --safe-top: 220px;
    --safe-bottom: 1470px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: #2a2a28;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    overflow: auto;
  }

  .stage {
    position: relative;
    width: 1080px;
    height: 1920px;
    flex: 0 0 auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    background: var(--ivory);
    overflow: hidden;
    transform-origin: top center;
  }

  /* Scale the 1080x1920 stage down for smaller screens so users can preview */
  @media (max-height: 1960px) {
    .stage { transform: scale(var(--fit, 1)); }
  }

  /* ====== PAPER TEXTURE ====== */
  .paper-noise {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.55;
    mix-blend-mode: multiply;
  }

  /* Faint legal-pad grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(26,26,26,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(26,26,26,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Subtle vignette for aged paper */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(120,90,40,0.14) 100%);
  }

  /* ====== SAFE ZONE DEBUG (toggled by ?debug=1) ====== */
  .safe-zone-overlay {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--safe-top);
    height: calc(var(--safe-bottom) - var(--safe-top));
    pointer-events: none;
    display: none;
    border: 2px dashed rgba(196, 48, 43, 0.55);
    z-index: 30;
  }
  .safe-zone-overlay::before,
  .safe-zone-overlay::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 0;
    border-top: 1px dashed rgba(196, 48, 43, 0.35);
  }
  .safe-zone-overlay::before { top: -60px; }
  .safe-zone-overlay::after  { bottom: -60px; }
  .debug .safe-zone-overlay { display: block; }

  /* ====== HEADER (persistent) ====== */
  .header-wrap {
    position: absolute;
    top: 260px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
  }
  .header-title {
    font-size: 30px;
    font-weight: 500;
    letter-spacing: 7px;
    opacity: 0;
    animation: fadeInTxt 0.45s ease 0.15s forwards;
  }

  /* Header underline drawn stroke */
  .header-line {
    position: absolute;
    top: 320px;
    left: 90px;
    right: 90px;
    height: 3px;
    overflow: visible;
  }

  @keyframes fadeInTxt {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ====== BODY / TYPEWRITER ====== */
  .body-text {
    position: absolute;
    left: 120px;
    right: 120px;
    top: 500px;
    font-family: 'Merriweather', 'Times New Roman', serif;
    font-weight: 700;
    font-size: 74px;
    line-height: 1.28;
    color: var(--ink);
    letter-spacing: -0.5px;
    min-height: 230px;
  }

  .typed {
    display: inline;
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .cursor {
    display: inline-block;
    width: 26px;
    height: 72px;
    background: var(--ink);
    margin-left: 6px;
    vertical-align: -12px;
    animation: blink 0.55s steps(1) infinite;
  }
  .cursor.hidden { display: none; }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* ====== STAMP ====== */
  .stamp-wrap {
    position: absolute;
    top: 880px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
  }

  .stamp {
    position: relative;
    display: inline-block;
    padding: 26px 80px;
    border: 10px solid var(--stamp);
    color: var(--stamp);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 140px;
    letter-spacing: 12px;
    transform: rotate(-8deg) scale(1.5);
    filter: url(#inkBlur);
    mix-blend-mode: multiply;
  }
  .stamp::before,
  .stamp::after {
    content: "";
    position: absolute;
    background: var(--stamp);
    opacity: 0.85;
  }
  .stamp::before {
    top: -24px; left: 50%;
    width: 12px; height: 12px;
    transform: translateX(-50%) rotate(45deg);
    opacity: 0.5;
  }
  .stamp::after {
    bottom: -28px; right: 10%;
    width: 20px; height: 7px;
    opacity: 0.4;
  }

  .stamp-wrap.stamped {
    animation: stampPlay 0.32s cubic-bezier(0.2, 1.4, 0.4, 1) forwards;
  }
  @keyframes stampPlay {
    0%   { opacity: 0; transform: translateY(-60px) scale(1.05); }
    55%  { opacity: 1; transform: translateY(6px) scale(1.0); }
    70%  { transform: translateY(-3px) scale(1.0); }
    100% { opacity: 1; transform: translateY(0) scale(1.0); }
  }
  .stamp-wrap.stamped .stamp {
    animation: stampImpact 0.28s cubic-bezier(0.2, 1.4, 0.4, 1) forwards;
  }
  @keyframes stampImpact {
    0%   { transform: rotate(-8deg) scale(1.5); filter: url(#inkBlur) blur(2px); }
    60%  { transform: rotate(-8deg) scale(0.94); filter: url(#inkBlur) blur(0.4px); }
    100% { transform: rotate(-8deg) scale(1.0);  filter: url(#inkBlur); }
  }

  /* ====== ANSWER: D-8 VISA ====== */
  .answer {
    position: absolute;
    top: 1200px;
    left: 0;
    right: 0;
    text-align: center;
    opacity: 0;
  }
  .answer-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    letter-spacing: 8px;
    color: var(--ink);
    opacity: 0.65;
    margin-bottom: 10px;
  }
  .answer-text {
    display: inline-block;
    font-family: 'Merriweather', 'Times New Roman', serif;
    font-weight: 900;
    font-size: 128px;
    color: var(--ink);
    letter-spacing: 2px;
    line-height: 1.0;
  }
  .answer.revealed {
    animation: answerRise 0.7s cubic-bezier(0.2, 0.9, 0.25, 1) forwards;
  }
  @keyframes answerRise {
    0%   { opacity: 0; transform: translateY(28px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Red underline beneath D-8 VISA */
  .underline {
    position: absolute;
    top: 1380px;
    left: 280px;
    right: 280px;
    height: 18px;
    overflow: visible;
  }

  /* ====== FOOTER (persistent, just above dead zone) ====== */
  .footer {
    position: absolute;
    top: 1428px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 5px;
    color: var(--ink);
    opacity: 0;
    animation: fadeInTxt 0.45s ease 0.3s forwards;
  }

  /* ====== REPLAY BUTTON ====== */
  .controls {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 50;
    display: flex;
    gap: 10px;
  }
  .replay-btn {
    background: var(--ivory);
    color: var(--ink);
    border: 2px solid var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 12px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .replay-btn:hover {
    background: var(--stamp);
    color: var(--ivory);
    border-color: var(--stamp);
  }
  .replay-btn:active {
    transform: translateY(1px);
  }
  /* Hidden in capture mode */
  .capture .controls { display: none; }

  /* Reset class used by JS */
  .prep * { animation: none !important; }
</style>
</head>
<body>

<div class="controls">
  <button class="replay-btn" id="replayBtn">▶ REPLAY</button>
</div>

<div class="stage" id="stage">

  <!-- SVG defs: paper noise filter + ink blur filter -->
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" stitchTiles="stitch"/>
        <feColorMatrix values="0 0 0 0 0.55
                               0 0 0 0 0.45
                               0 0 0 0 0.30
                               0 0 0 0.22 0"/>
      </filter>
      <filter id="inkBlur" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
        <feGaussianBlur stdDeviation="0.6"/>
      </filter>
    </defs>
  </svg>

  <!-- Paper textures -->
  <svg class="paper-noise" viewBox="0 0 1080 1920" preserveAspectRatio="none">
    <rect width="1080" height="1920" filter="url(#paperNoise)"/>
  </svg>
  <div class="grid"></div>
  <div class="vignette"></div>

  <!-- Safe zone debug overlay (enabled with ?debug=1) -->
  <div class="safe-zone-overlay"></div>

  <!-- Header (persistent) -->
  <div class="header-wrap">
    <div class="header-title">IMMIGRATION&nbsp;&nbsp;LAW&nbsp;&nbsp;FIRM&nbsp;&nbsp;IN&nbsp;&nbsp;KOREA</div>
  </div>

  <!-- Horizontal drawn line below header -->
  <svg class="header-line" viewBox="0 0 900 3" preserveAspectRatio="none">
    <line id="hLine" x1="0" y1="1.5" x2="900" y2="1.5"
          stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"
          pathLength="1"
          stroke-dasharray="1 1"
          stroke-dashoffset="1"/>
  </svg>

  <!-- Body typewriter text -->
  <div class="body-text">
    <span class="typed" id="typed"></span><span class="cursor" id="cursor"></span>
  </div>

  <!-- Red STOP. stamp -->
  <div class="stamp-wrap" id="stampWrap">
    <div class="stamp">STOP.</div>
  </div>

  <!-- Answer: D-8 VISA -->
  <div class="answer" id="answer">
    <div class="answer-label">YOU&nbsp;NEED</div>
    <div class="answer-text">D‑8&nbsp;VISA</div>
  </div>

  <!-- Red underline under D-8 VISA -->
  <svg class="underline" viewBox="0 0 520 18" preserveAspectRatio="none">
    <line id="uLine" x1="0" y1="9" x2="520" y2="9"
          stroke="#c4302b" stroke-width="6" stroke-linecap="round"
          pathLength="1"
          stroke-dasharray="1 1"
          stroke-dashoffset="1"/>
  </svg>

  <!-- Footer (persistent, just above dead zone) -->
  <div class="footer">
    Lawyeon&nbsp;&nbsp;Visa&nbsp;&nbsp;&&nbsp;&nbsp;Immigration&nbsp;&nbsp;Center
  </div>

</div>

<script>
(function () {
  const stage      = document.getElementById('stage');
  const hLine      = document.getElementById('hLine');
  const uLine      = document.getElementById('uLine');
  const typed      = document.getElementById('typed');
  const cursor     = document.getElementById('cursor');
  const stampWrap  = document.getElementById('stampWrap');
  const answerEl   = document.getElementById('answer');
  const replayBtn  = document.getElementById('replayBtn');

  const MESSAGE = "Moving to Korea to open a small business?";

  const params = new URLSearchParams(location.search);
  if (params.get('debug') === '1') document.body.classList.add('debug');
  if (params.get('capture') === '1') document.body.classList.add('capture');

  const timers = [];
  let rafId = null;

  // Scale stage to fit viewport
  function fitStage() {
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    const scale = Math.min(vh / 1920, vw / 1080, 1);
    stage.style.setProperty('--fit', scale);
  }
  window.addEventListener('resize', fitStage);
  fitStage();

  function clearAll() {
    timers.forEach(t => clearTimeout(t));
    timers.length = 0;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }

  function drawLine(el, duration, easing) {
    return new Promise(resolve => {
      const start = performance.now();
      const ease = easing || (t => t);
      function tick(now) {
        const p = Math.min(1, (now - start) / duration);
        const v = 1 - ease(p);
        el.setAttribute('stroke-dashoffset', v.toFixed(4));
        if (p < 1) rafId = requestAnimationFrame(tick);
        else resolve();
      }
      rafId = requestAnimationFrame(tick);
    });
  }

  function typeOut(text, totalMs) {
    return new Promise(resolve => {
      const n = text.length;
      const base = totalMs / n;
      let i = 0;
      function next() {
        if (i > n) return resolve();
        typed.textContent = text.slice(0, i);
        i++;
        const ch = text[i - 1] || '';
        let delay = base + (Math.random() * base * 0.6 - base * 0.3);
        if (ch === ' ') delay *= 0.6;
        if (ch === '?' || ch === ',') delay *= 2.2;
        const t = setTimeout(next, Math.max(18, delay));
        timers.push(t);
      }
      next();
    });
  }

  function sleep(ms) {
    return new Promise(resolve => {
      const t = setTimeout(resolve, ms);
      timers.push(t);
    });
  }

  function resetAll() {
    clearAll();
    hLine.setAttribute('stroke-dashoffset', '1');
    uLine.setAttribute('stroke-dashoffset', '1');
    typed.textContent = '';
    cursor.classList.remove('hidden');
    stampWrap.classList.remove('stamped');
    stampWrap.style.opacity = '0';
    answerEl.classList.remove('revealed');
    answerEl.style.opacity = '0';
    stage.classList.add('prep');
    void stage.offsetWidth;
    stage.classList.remove('prep');
  }

  async function play() {
    resetAll();

    // 0.0 – 0.7s: header + horizontal line drawn
    await drawLine(hLine, 600, t => 1 - Math.pow(1 - t, 2));
    await sleep(80);

    // 0.7 – 2.9s: typewriter (~2.2s, natural pace)
    await typeOut(MESSAGE, 2150);

    // 2.9 – 3.6s: pause with blinking cursor
    await sleep(700);

    // Hide cursor just before stamp
    cursor.classList.add('hidden');

    // 3.6 – 4.0s: stamp impact
    stampWrap.classList.add('stamped');
    await sleep(380);

    // 4.0 – 5.0s: stamp hold (beat)
    await sleep(1000);

    // 5.0 – 5.8s: D-8 VISA reveals
    answerEl.classList.add('revealed');
    await sleep(700);

    // 5.8 – 6.4s: red underline draws under D-8 VISA
    await drawLine(uLine, 600, t => 1 - Math.pow(1 - t, 3));

    // 6.4 – 8.0s: hold (1.6s) for voiceover tail
    await sleep(1600);
  }

  replayBtn.addEventListener('click', () => play());

  window.addEventListener('load', () => {
    requestAnimationFrame(() => requestAnimationFrame(play));
  });
})();
</script>

</body>
</html>
