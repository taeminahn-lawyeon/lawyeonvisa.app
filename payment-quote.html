<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png?v=3">
    <title>견적 결제 - Lawyeon Visa Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- 결제 키 설정 (SDK 로드 전에 선언) -->
    <script>
        window.__PAYMENT_CONFIG__ = {
            tossClientKey: 'live_ck_mBZ1gQ4YVX55PNLM1vkarl2KPoqN'
        };
    </script>
    <script src="https://js.tosspayments.com/v1/payment"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F8FAFC; color: #191F28;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .card {
            background: #fff; border-radius: 16px; width: 100%; max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding: 32px 28px;
        }
        .title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
        .row { display: flex; justify-content: space-between; color: #374151; margin-bottom: 10px; }
        .row.total {
            font-weight: 700; color: #191F28; font-size: 18px;
            border-top: 1px solid #E5E7EB; padding-top: 14px; margin-top: 14px;
        }
        .pay-btn {
            width: 100%; margin-top: 28px; padding: 16px; border: none; border-radius: 12px;
            background: #3182F6; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .pay-btn:disabled { background: #C9D6E5; cursor: not-allowed; }
        .state { text-align: center; color: #6B7684; padding: 20px 0; }
        .state.error { color: #DC2626; }
        .back { display: block; text-align: center; margin-top: 16px; color: #6B7684; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">견적 결제 / Quote Payment</div>
        <div id="loading" class="state">불러오는 중...</div>
        <div id="error" class="state error" style="display:none;"></div>
        <div id="quoteBody" style="display:none;">
            <div class="row"><span>대행 보수 / Agency Fee</span><span id="agencyFee">-</span></div>
            <div class="row"><span>관납료 / Gov. Fee</span><span id="govtFee">-</span></div>
            <div class="row total"><span>합계 / Total</span><span id="totalAmount">-</span></div>
            <button id="payBtn" class="pay-btn" onclick="payNow()">카드로 결제하기 / Pay with Card</button>
        </div>
        <a id="backLink" class="back" href="#" style="display:none;">← 스레드로 돌아가기</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=20260527"></script>
    <script>
        const clientKey = window.__PAYMENT_CONFIG__?.tossClientKey;
        let tossPayments = null;
        let currentQuote = null;
        let threadIdParam = null;

        function fmt(amount, currency) {
            const n = Number(amount) || 0;
            if (currency === 'KRW') return '₩' + n.toLocaleString('ko-KR');
            return n.toLocaleString() + ' ' + (currency || 'KRW');
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('quoteBody').style.display = 'none';
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            if (threadIdParam) {
                const back = document.getElementById('backLink');
                back.href = `thread-general-v2.html?id=${threadIdParam}`;
                back.style.display = 'block';
            }
        }

        window.addEventListener('DOMContentLoaded', async function () {
            const params = new URLSearchParams(window.location.search);
            const quoteId = params.get('quote');
            threadIdParam = params.get('thread');

            if (!quoteId) { showError('잘못된 접근입니다. (견적 정보 없음)'); return; }

            const session = await checkSession();
            if (!session || !session.user) {
                localStorage.setItem('redirectAfterLogin', window.location.href);
                showError('로그인이 필요합니다. 스레드에서 다시 시도해 주세요.');
                return;
            }

            const result = await getQuote(quoteId);
            if (!result.success || !result.data) { showError('견적을 찾을 수 없습니다.'); return; }

            currentQuote = result.data;
            if (!threadIdParam) threadIdParam = currentQuote.thread_id;

            if (currentQuote.status === 'paid') { showError('이미 결제가 완료된 견적입니다.'); return; }
            if (currentQuote.status === 'cancelled') { showError('취소된 견적입니다.'); return; }
            if (currentQuote.status === 'expired' || (currentQuote.expires_at && new Date(currentQuote.expires_at) < new Date())) {
                showError('만료된 견적입니다. 담당자에게 새 견적을 요청해 주세요.');
                return;
            }

            document.getElementById('agencyFee').textContent = fmt(currentQuote.agency_fee, currentQuote.currency);
            document.getElementById('govtFee').textContent = fmt(currentQuote.govt_fee, currentQuote.currency);
            document.getElementById('totalAmount').textContent = fmt(currentQuote.total_amount, currentQuote.currency);

            try { tossPayments = TossPayments(clientKey); }
            catch (e) { console.error('Toss init failed:', e); showError('결제 모듈 초기화에 실패했습니다.'); return; }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('quoteBody').style.display = 'block';
        });

        async function payNow() {
            if (!currentQuote || !tossPayments) return;
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.textContent = '결제창을 여는 중...';

            try {
                const session = await checkSession();
                const profileResult = session?.user ? await getUserProfile(session.user.id) : null;
                const profile = (profileResult && profileResult.success) ? profileResult.data : null;

                const origin = window.location.origin;
                const successUrl = `${origin}/payment-success.html?quote=${currentQuote.id}`;

                const paymentRequest = {
                    amount: currentQuote.total_amount,
                    orderId: currentQuote.toss_order_id,
                    orderName: '비자 대행 서비스 견적',
                    successUrl: successUrl,
                    failUrl: `${origin}/payment-fail.html`,
                    customerEmail: profile?.email || session?.user?.email || '',
                    customerName: profile?.name || (session?.user?.email || '')
                };
                if (profile?.phone && profile.phone.trim()) {
                    paymentRequest.customerMobilePhone = profile.phone.replace(/-/g, '');
                }

                await tossPayments.requestPayment('카드', paymentRequest);
            } catch (error) {
                console.error('Payment error:', error);
                btn.disabled = false;
                btn.textContent = '카드로 결제하기 / Pay with Card';
                if (error.code === 'PAY_PROCESS_CANCELED') return;
                alert('결제 처리 중 오류가 발생했습니다.');
            }
        }
    </script>
</body>
</html>
