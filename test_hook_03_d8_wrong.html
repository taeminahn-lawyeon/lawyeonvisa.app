<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lawyeon — Living Legal Document (test_hook_03 · D-8 Wrong Visa)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #f8f4ea;
    --ink: #1a1a1a;
    --stamp: #c4302b;

    /* 9:16 shortform safe zone: y = 220 ~ 1470 (height 1250) */
    --safe-top: 220px;
    --safe-bottom: 1470px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: #2a2a28;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    overflow: auto;
  }

  .stage {
    position: relative;
    width: 1080px;
    height: 1920px;
    flex: 0 0 auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    background: var(--ivory);
    overflow: hidden;
    transform-origin: top center;
  }
  @media (max-height: 1960px) {
    .stage { transform: scale(var(--fit, 1)); }
  }

  /* ====== PAPER TEXTURE ====== */
  .paper-noise { position: absolute; inset: 0; pointer-events: none; opacity: 0.55; mix-blend-mode: multiply; }
  .grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(to right, rgba(26,26,26,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(26,26,26,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(120,90,40,0.14) 100%);
  }

  /* ====== SAFE ZONE DEBUG ====== */
  .safe-zone-overlay {
    position: absolute; left: 0; right: 0;
    top: var(--safe-top);
    height: calc(var(--safe-bottom) - var(--safe-top));
    pointer-events: none; display: none;
    border: 2px dashed rgba(196, 48, 43, 0.55);
    z-index: 30;
  }
  .debug .safe-zone-overlay { display: block; }

  /* ====== HEADER ====== */
  .header-wrap {
    position: absolute; top: 260px; left: 0; right: 0;
    text-align: center; color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
  }
  .header-title {
    font-size: 30px; font-weight: 500; letter-spacing: 7px;
    opacity: 0; animation: fadeInTxt 0.45s ease 0.15s forwards;
  }
  .header-line {
    position: absolute; top: 320px; left: 90px; right: 90px;
    height: 3px; overflow: visible;
  }

  @keyframes fadeInTxt {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ====== TOP SECTION (D-8 critique) ====== */
  .top-section {
    position: absolute; top: 410px; left: 0; right: 0;
    text-align: center; color: var(--ink);
  }
  .visa-title {
    font-family: 'Merriweather', 'Times New Roman', serif;
    font-weight: 900;
    font-size: 110px;
    letter-spacing: 2px;
    line-height: 1.0;
    opacity: 0;
    transform: translateY(16px);
    z-index: 2;
    position: relative;
  }
  .visa-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 30px;
    letter-spacing: 5px;
    margin-top: 22px;
    opacity: 0;
    transform: translateY(10px);
  }
  .bullet-list {
    margin-top: 38px;
    display: inline-block;
    text-align: left;
    font-family: 'Merriweather', 'Times New Roman', serif;
    font-weight: 400;
    font-size: 50px;
    line-height: 1.45;
    color: var(--ink);
  }
  .bullet-list .bullet {
    opacity: 0;
    transform: translateX(-12px);
    display: block;
  }
  .bullet-list .bullet .dash {
    color: var(--stamp);
    margin-right: 18px;
    font-weight: 700;
  }

  /* Center divider between top and bottom */
  .divider {
    position: absolute; top: 920px; left: 240px; right: 240px;
    height: 2px; overflow: visible;
  }

  /* ====== BOTTOM SECTION (small business examples) ====== */
  .bottom-section {
    position: absolute; top: 970px; left: 0; right: 0;
    text-align: center; color: var(--ink);
  }
  .bottom-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 30px;
    letter-spacing: 5px;
    opacity: 0;
    transform: translateY(10px);
  }
  .bottom-list {
    margin-top: 28px;
    display: inline-block;
    text-align: left;
    font-family: 'Merriweather', 'Times New Roman', serif;
    font-weight: 400;
    font-size: 48px;
    line-height: 1.4;
  }
  .bottom-list .bullet {
    opacity: 0;
    transform: translateX(-12px);
    display: block;
  }
  .bottom-list .bullet .dash {
    color: var(--ink);
    margin-right: 18px;
    font-weight: 700;
  }

  .closing {
    margin-top: 28px;
    font-family: 'Merriweather', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 36px;
    color: var(--ink);
    opacity: 0;
  }

  /* Reveal animations */
  .visa-title.in,
  .visa-subtitle.in,
  .bottom-subtitle.in,
  .closing.in {
    animation: rise 0.55s cubic-bezier(0.2, 0.9, 0.25, 1) forwards;
  }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
  .bullet.in {
    animation: bulletIn 0.45s cubic-bezier(0.2, 0.9, 0.25, 1) forwards;
  }
  @keyframes bulletIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* ====== STAMP (WRONG.) ====== */
  .stamp-wrap {
    position: absolute;
    top: 430px;
    left: 0; right: 0;
    display: flex; justify-content: center;
    pointer-events: none;
    opacity: 0;
    z-index: 5;
  }
  .stamp {
    position: relative;
    display: inline-block;
    padding: 26px 80px;
    border: 10px solid var(--stamp);
    color: var(--stamp);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 130px;
    letter-spacing: 12px;
    transform: rotate(-7deg) scale(1.5);
    filter: url(#inkBlur);
    mix-blend-mode: multiply;
  }
  .stamp::before, .stamp::after {
    content: ""; position: absolute;
    background: var(--stamp); opacity: 0.85;
  }
  .stamp::before {
    top: -24px; left: 50%;
    width: 12px; height: 12px;
    transform: translateX(-50%) rotate(45deg);
    opacity: 0.5;
  }
  .stamp::after {
    bottom: -28px; right: 10%;
    width: 20px; height: 7px; opacity: 0.4;
  }
  .stamp-wrap.stamped {
    animation: stampPlay 0.32s cubic-bezier(0.2, 1.4, 0.4, 1) forwards;
  }
  @keyframes stampPlay {
    0%   { opacity: 0; transform: translateY(-60px) scale(1.05); }
    55%  { opacity: 1; transform: translateY(6px) scale(1.0); }
    70%  { transform: translateY(-3px) scale(1.0); }
    100% { opacity: 1; transform: translateY(0) scale(1.0); }
  }
  .stamp-wrap.stamped .stamp {
    animation: stampImpact 0.28s cubic-bezier(0.2, 1.4, 0.4, 1) forwards;
  }
  @keyframes stampImpact {
    0%   { transform: rotate(-7deg) scale(1.5); filter: url(#inkBlur) blur(2px); }
    60%  { transform: rotate(-7deg) scale(0.94); filter: url(#inkBlur) blur(0.4px); }
    100% { transform: rotate(-7deg) scale(1.0);  filter: url(#inkBlur); }
  }

  /* ====== FOOTER ====== */
  .footer {
    position: absolute; top: 1428px; left: 0; right: 0;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px; font-weight: 500; letter-spacing: 5px;
    color: var(--ink);
    opacity: 0;
    animation: fadeInTxt 0.45s ease 0.3s forwards;
  }

  /* ====== REPLAY BUTTON ====== */
  .controls {
    position: fixed; top: 20px; right: 20px; z-index: 50;
    display: flex; gap: 10px;
  }
  .replay-btn {
    background: var(--ivory); color: var(--ink);
    border: 2px solid var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 14px; letter-spacing: 3px;
    padding: 12px 20px; cursor: pointer;
    transition: all 0.15s ease;
  }
  .replay-btn:hover { background: var(--stamp); color: var(--ivory); border-color: var(--stamp); }
  .replay-btn:active { transform: translateY(1px); }
  .capture .controls { display: none; }

  .prep * { animation: none !important; }
</style>
</head>
<body>

<div class="controls">
  <button class="replay-btn" id="replayBtn">▶ REPLAY</button>
</div>

<div class="stage" id="stage">

  <!-- SVG defs -->
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="11" stitchTiles="stitch"/>
        <feColorMatrix values="0 0 0 0 0.55
                               0 0 0 0 0.45
                               0 0 0 0 0.30
                               0 0 0 0.22 0"/>
      </filter>
      <filter id="inkBlur" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
        <feGaussianBlur stdDeviation="0.6"/>
      </filter>
    </defs>
  </svg>

  <!-- Paper textures -->
  <svg class="paper-noise" viewBox="0 0 1080 1920" preserveAspectRatio="none">
    <rect width="1080" height="1920" filter="url(#paperNoise)"/>
  </svg>
  <div class="grid"></div>
  <div class="vignette"></div>
  <div class="safe-zone-overlay"></div>

  <!-- Header -->
  <div class="header-wrap">
    <div class="header-title">IMMIGRATION&nbsp;&nbsp;LAW&nbsp;&nbsp;FIRM&nbsp;&nbsp;IN&nbsp;&nbsp;KOREA</div>
  </div>
  <svg class="header-line" viewBox="0 0 900 3" preserveAspectRatio="none">
    <line id="hLine" x1="0" y1="1.5" x2="900" y2="1.5"
          stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"
          pathLength="1" stroke-dasharray="1 1" stroke-dashoffset="1"/>
  </svg>

  <!-- TOP SECTION: D-8 critique -->
  <div class="top-section">
    <div class="visa-title" id="visaTitle">D‑8&nbsp;VISA</div>
    <div class="visa-subtitle" id="visaSubtitle">IS&nbsp;ONLY&nbsp;FOR&nbsp;CORPORATIONS</div>
    <div class="bullet-list">
      <span class="bullet" data-i="0"><span class="dash">—</span>Tech&nbsp;startups</span>
      <span class="bullet" data-i="1"><span class="dash">—</span>Venture&nbsp;companies</span>
      <span class="bullet" data-i="2"><span class="dash">—</span>Investors</span>
    </div>
  </div>

  <!-- WRONG. stamp (overlays D-8 VISA title at the end) -->
  <div class="stamp-wrap" id="stampWrap">
    <div class="stamp">WRONG.</div>
  </div>

  <!-- Center divider -->
  <svg class="divider" viewBox="0 0 600 2" preserveAspectRatio="none">
    <line id="dLine" x1="0" y1="1" x2="600" y2="1"
          stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"
          pathLength="1"
          stroke-dasharray="1 1" stroke-dashoffset="1"/>
  </svg>

  <!-- BOTTOM SECTION: small business examples -->
  <div class="bottom-section">
    <div class="bottom-subtitle" id="bottomSubtitle">BUT&nbsp;IF&nbsp;YOU&nbsp;WANT</div>
    <div class="bottom-list">
      <span class="bullet" data-j="0"><span class="dash">—</span>A&nbsp;café</span>
      <span class="bullet" data-j="1"><span class="dash">—</span>A&nbsp;convenience&nbsp;store</span>
      <span class="bullet" data-j="2"><span class="dash">—</span>An&nbsp;unmanned&nbsp;ice&nbsp;cream&nbsp;shop</span>
    </div>
    <div class="closing" id="closing">a small business in your own name</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Lawyeon&nbsp;&nbsp;Visa&nbsp;&nbsp;&&nbsp;&nbsp;Immigration&nbsp;&nbsp;Center
  </div>

</div>

<script>
(function () {
  const stage         = document.getElementById('stage');
  const hLine         = document.getElementById('hLine');
  const dLine         = document.getElementById('dLine');
  const visaTitle     = document.getElementById('visaTitle');
  const visaSubtitle  = document.getElementById('visaSubtitle');
  const bottomSubtitle= document.getElementById('bottomSubtitle');
  const closing       = document.getElementById('closing');
  const stampWrap     = document.getElementById('stampWrap');
  const replayBtn     = document.getElementById('replayBtn');
  const topBullets    = Array.from(document.querySelectorAll('.top-section .bullet'));
  const bottomBullets = Array.from(document.querySelectorAll('.bottom-section .bullet'));

  const params = new URLSearchParams(location.search);
  if (params.get('debug') === '1') document.body.classList.add('debug');
  if (params.get('capture') === '1') document.body.classList.add('capture');

  const timers = [];
  let rafId = null;

  function fitStage() {
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    const scale = Math.min(vh / 1920, vw / 1080, 1);
    stage.style.setProperty('--fit', scale);
  }
  window.addEventListener('resize', fitStage);
  fitStage();

  function clearAll() {
    timers.forEach(t => clearTimeout(t));
    timers.length = 0;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }

  function drawLine(el, duration, easing) {
    return new Promise(resolve => {
      const start = performance.now();
      const ease = easing || (t => t);
      function tick(now) {
        const p = Math.min(1, (now - start) / duration);
        const v = 1 - ease(p);
        el.setAttribute('stroke-dashoffset', v.toFixed(4));
        if (p < 1) rafId = requestAnimationFrame(tick);
        else resolve();
      }
      rafId = requestAnimationFrame(tick);
    });
  }

  function reveal(el) { el.classList.add('in'); }

  function sleep(ms) {
    return new Promise(resolve => {
      const t = setTimeout(resolve, ms);
      timers.push(t);
    });
  }

  function resetAll() {
    clearAll();
    hLine.setAttribute('stroke-dashoffset', '1');
    dLine.setAttribute('stroke-dashoffset', '1');
    [visaTitle, visaSubtitle, bottomSubtitle, closing, ...topBullets, ...bottomBullets]
      .forEach(el => el.classList.remove('in'));
    stampWrap.classList.remove('stamped');
    stampWrap.style.opacity = '0';
    stage.classList.add('prep');
    void stage.offsetWidth;
    stage.classList.remove('prep');
  }

  // ============================================================
  // Timeline (15.0s) — synced to audio:
  // 0.0–0.6  : header underline draws
  //            VO: "The D-8 is only for corporations —"
  // 0.6–1.0  : "D-8 VISA" title rises
  // 1.0–1.4  : "IS ONLY FOR CORPORATIONS" subtitle
  // 1.4–3.0  : 3 top bullets (tech / venture / investors) stagger in
  //            VO: "tech startups, venture companies, investors..."
  // 3.0–3.6  : center divider draws (dashed)
  // 3.6–4.0  : "BUT IF YOU WANT" subtitle
  // 4.0–7.0  : 3 bottom bullets (cafe / convenience / ice cream) stagger
  //            VO: "If you want to open a cafe, convenience store, ice cream shop"
  // 7.0–8.2  : closing italic line
  //            VO: "a small business in your own name"
  // 8.2–9.0  : pause / breath
  // 9.0–9.4  : WRONG. stamp slams over D-8 VISA
  //            VO: "D-8 is the wrong visa."
  // 9.4–11.0 : stamp hold
  // 11.0–15.0: hold for transition tail
  // ============================================================
  async function play() {
    resetAll();

    // 0.0 – 0.6s
    await drawLine(hLine, 600, t => 1 - Math.pow(1 - t, 2));

    // 0.6 – 1.0s
    reveal(visaTitle);
    await sleep(400);

    // 1.0 – 1.4s
    reveal(visaSubtitle);
    await sleep(400);

    // 1.4 – 3.0s : 3 top bullets staggered ~520ms apart
    for (let i = 0; i < topBullets.length; i++) {
      reveal(topBullets[i]);
      await sleep(520);
    }
    // ~ at 1.4 + 3*520 = 2.96s

    // 3.0 – 3.6s : center divider
    await drawLine(dLine, 600, t => 1 - Math.pow(1 - t, 2));

    // 3.6 – 4.0s : bottom subtitle
    reveal(bottomSubtitle);
    await sleep(400);

    // 4.0 – 7.0s : 3 bottom bullets ~700ms staggered (matches longer audio enumeration)
    for (let j = 0; j < bottomBullets.length; j++) {
      reveal(bottomBullets[j]);
      await sleep(700);
    }
    // ~ at 4.0 + 3*700 = 6.1s
    await sleep(900); // padding to ~7.0s

    // 7.0 – 8.2s : closing italic
    reveal(closing);
    await sleep(1200);

    // 8.2 – 9.0s : breath
    await sleep(800);

    // 9.0 – 9.4s : WRONG. stamp slams over D-8 VISA
    stampWrap.classList.add('stamped');
    await sleep(400);

    // 9.4 – 11.0s : stamp hold
    await sleep(1600);

    // 11.0 – 15.0s : tail hold
    await sleep(4000);
  }

  replayBtn.addEventListener('click', () => play());

  window.addEventListener('load', () => {
    requestAnimationFrame(() => requestAnimationFrame(play));
  });
})();
</script>

</body>
</html>
