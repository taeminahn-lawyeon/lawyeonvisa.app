<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lawyeon — Living Legal Document (test_hook_05 · Brand & CTA)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #f8f4ea;
    --ink: #1a1a1a;
    --stamp: #c4302b;

    --safe-top: 220px;
    --safe-bottom: 1470px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: #2a2a28;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    overflow: auto;
  }

  .stage {
    position: relative;
    width: 1080px;
    height: 1920px;
    flex: 0 0 auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    background: var(--ivory);
    overflow: hidden;
    transform-origin: top center;
  }
  @media (max-height: 1960px) {
    .stage { transform: scale(var(--fit, 1)); }
  }

  /* ====== PAPER TEXTURE ====== */
  .paper-noise { position: absolute; inset: 0; pointer-events: none; opacity: 0.55; mix-blend-mode: multiply; }
  .grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(to right, rgba(26,26,26,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(26,26,26,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(120,90,40,0.14) 100%);
  }

  .safe-zone-overlay {
    position: absolute; left: 0; right: 0;
    top: var(--safe-top);
    height: calc(var(--safe-bottom) - var(--safe-top));
    pointer-events: none; display: none;
    border: 2px dashed rgba(196, 48, 43, 0.55);
    z-index: 30;
  }
  .debug .safe-zone-overlay { display: block; }

  /* ====== HEADER ====== */
  .header-wrap {
    position: absolute; top: 260px; left: 0; right: 0;
    text-align: center; color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
  }
  .header-title {
    font-size: 30px; font-weight: 500; letter-spacing: 7px;
    opacity: 0; animation: fadeInTxt 0.45s ease 0.15s forwards;
  }
  .header-line {
    position: absolute; top: 320px; left: 90px; right: 90px;
    height: 3px; overflow: visible;
  }
  @keyframes fadeInTxt {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ====== BRAND REVEAL ====== */
  .brand-block {
    position: absolute; top: 460px; left: 0; right: 0;
    text-align: center; color: var(--ink);
  }
  .this-is {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 32px;
    letter-spacing: 10px;
    opacity: 0;
    transform: translateY(10px);
  }
  .brand-name {
    font-family: 'Merriweather', 'Times New Roman', serif;
    font-weight: 900;
    font-size: 110px;
    letter-spacing: 0px;
    line-height: 1.0;
    margin-top: 32px;
    opacity: 0;
    transform: translateY(18px) scale(0.97);
  }
  .brand-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: 9px;
    margin-top: 28px;
    opacity: 0;
    transform: translateY(10px);
  }

  /* Red underline beneath the brand name */
  .brand-underline {
    position: absolute; top: 720px;
    left: 180px; right: 180px;
    height: 22px; overflow: visible;
  }

  /* ====== MIDDLE: FULL GUIDE + LINK IN BIO ====== */
  .guide-line {
    position: absolute; top: 900px; left: 100px; right: 100px;
    text-align: center;
    font-family: 'Merriweather', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 44px;
    line-height: 1.3;
    color: var(--ink);
    opacity: 0;
    transform: translateY(12px);
  }

  .link-callout-wrap {
    position: absolute; top: 1030px; left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    opacity: 0;
  }
  .link-callout {
    display: inline-block;
    border: 6px solid var(--stamp);
    color: var(--stamp);
    padding: 18px 50px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 52px;
    letter-spacing: 6px;
    transform: rotate(-2deg);
    filter: url(#inkBlur);
    mix-blend-mode: multiply;
  }
  .link-arrow {
    display: inline-block;
    margin-right: 18px;
  }

  .link-callout-wrap.stamped {
    animation: stampPlay 0.34s cubic-bezier(0.2, 1.4, 0.4, 1) forwards;
  }
  @keyframes stampPlay {
    0%   { opacity: 0; transform: translateY(-40px) scale(1.04); }
    55%  { opacity: 1; transform: translateY(4px) scale(1.0); }
    100% { opacity: 1; transform: translateY(0) scale(1.0); }
  }

  /* ====== BOTTOM CTA ====== */
  .cta-block {
    position: absolute; top: 1220px; left: 0; right: 0;
    text-align: center;
    color: var(--ink);
  }
  .cta-main {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 44px;
    letter-spacing: 6px;
    opacity: 0;
    transform: translateY(10px);
  }
  .cta-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 400;
    font-size: 30px;
    letter-spacing: 10px;
    color: var(--stamp);
    margin-top: 18px;
    opacity: 0;
    transform: translateY(10px);
  }

  /* Reveal animations */
  .this-is.in,
  .brand-name.in,
  .brand-sub.in,
  .guide-line.in,
  .cta-main.in,
  .cta-sub.in {
    animation: rise 0.6s cubic-bezier(0.2, 0.9, 0.25, 1) forwards;
  }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ====== FOOTER ====== */
  .footer {
    position: absolute; top: 1428px; left: 0; right: 0;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px; font-weight: 500; letter-spacing: 5px;
    color: var(--ink);
    opacity: 0;
    animation: fadeInTxt 0.45s ease 0.3s forwards;
  }

  /* ====== CONTROLS ====== */
  .controls {
    position: fixed; top: 20px; right: 20px; z-index: 50;
    display: flex; gap: 10px;
  }
  .replay-btn {
    background: var(--ivory); color: var(--ink);
    border: 2px solid var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 14px; letter-spacing: 3px;
    padding: 12px 20px; cursor: pointer;
    transition: all 0.15s ease;
  }
  .replay-btn:hover { background: var(--stamp); color: var(--ivory); border-color: var(--stamp); }
  .replay-btn:active { transform: translateY(1px); }
  .capture .controls { display: none; }

  .prep * { animation: none !important; }
</style>
</head>
<body>

<div class="controls">
  <button class="replay-btn" id="replayBtn">▶ REPLAY</button>
</div>

<div class="stage" id="stage">

  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="23" stitchTiles="stitch"/>
        <feColorMatrix values="0 0 0 0 0.55
                               0 0 0 0 0.45
                               0 0 0 0 0.30
                               0 0 0 0.22 0"/>
      </filter>
      <filter id="inkBlur" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="9" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
        <feGaussianBlur stdDeviation="0.6"/>
      </filter>
    </defs>
  </svg>

  <svg class="paper-noise" viewBox="0 0 1080 1920" preserveAspectRatio="none">
    <rect width="1080" height="1920" filter="url(#paperNoise)"/>
  </svg>
  <div class="grid"></div>
  <div class="vignette"></div>
  <div class="safe-zone-overlay"></div>

  <!-- Header -->
  <div class="header-wrap">
    <div class="header-title">IMMIGRATION&nbsp;&nbsp;LAW&nbsp;&nbsp;FIRM&nbsp;&nbsp;IN&nbsp;&nbsp;KOREA</div>
  </div>
  <svg class="header-line" viewBox="0 0 900 3" preserveAspectRatio="none">
    <line id="hLine" x1="0" y1="1.5" x2="900" y2="1.5"
          stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"
          pathLength="1" stroke-dasharray="1 1" stroke-dashoffset="1"/>
  </svg>

  <!-- Brand reveal -->
  <div class="brand-block">
    <div class="this-is" id="thisIs">THIS&nbsp;&nbsp;IS</div>
    <div class="brand-name" id="brandName">Law&nbsp;Firm&nbsp;Lawyeon</div>
    <div class="brand-sub" id="brandSub">VISA&nbsp;&nbsp;&&nbsp;&nbsp;IMMIGRATION&nbsp;&nbsp;CENTER</div>
  </div>

  <svg class="brand-underline" viewBox="0 0 720 22" preserveAspectRatio="none">
    <line id="uLine" x1="0" y1="11" x2="720" y2="11"
          stroke="#c4302b" stroke-width="7" stroke-linecap="round"
          pathLength="1" stroke-dasharray="1 1" stroke-dashoffset="1"/>
  </svg>

  <!-- Guide line -->
  <div class="guide-line" id="guideLine">
    Full guide: how to start a business in Korea
  </div>

  <!-- LINK IN BIO callout -->
  <div class="link-callout-wrap" id="linkCallout">
    <div class="link-callout">
      <span class="link-arrow">→</span>LINK&nbsp;IN&nbsp;BIO
    </div>
  </div>

  <!-- Bottom CTA -->
  <div class="cta-block">
    <div class="cta-main" id="ctaMain">FREE&nbsp;&nbsp;PRE‑CONSULTATION</div>
    <div class="cta-sub" id="ctaSub">AVAILABLE</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Lawyeon&nbsp;&nbsp;Visa&nbsp;&nbsp;&&nbsp;&nbsp;Immigration&nbsp;&nbsp;Center
  </div>

</div>

<script>
(function () {
  const stage        = document.getElementById('stage');
  const hLine        = document.getElementById('hLine');
  const uLine        = document.getElementById('uLine');
  const thisIs       = document.getElementById('thisIs');
  const brandName    = document.getElementById('brandName');
  const brandSub     = document.getElementById('brandSub');
  const guideLine    = document.getElementById('guideLine');
  const linkCallout  = document.getElementById('linkCallout');
  const ctaMain      = document.getElementById('ctaMain');
  const ctaSub       = document.getElementById('ctaSub');
  const replayBtn    = document.getElementById('replayBtn');

  const params = new URLSearchParams(location.search);
  if (params.get('debug') === '1') document.body.classList.add('debug');
  if (params.get('capture') === '1') document.body.classList.add('capture');

  const timers = [];
  let rafId = null;

  function fitStage() {
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    const scale = Math.min(vh / 1920, vw / 1080, 1);
    stage.style.setProperty('--fit', scale);
  }
  window.addEventListener('resize', fitStage);
  fitStage();

  function clearAll() {
    timers.forEach(t => clearTimeout(t));
    timers.length = 0;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }

  function drawLine(el, duration, easing) {
    return new Promise(resolve => {
      const start = performance.now();
      const ease = easing || (t => t);
      function tick(now) {
        const p = Math.min(1, (now - start) / duration);
        const v = 1 - ease(p);
        el.setAttribute('stroke-dashoffset', v.toFixed(4));
        if (p < 1) rafId = requestAnimationFrame(tick);
        else resolve();
      }
      rafId = requestAnimationFrame(tick);
    });
  }

  function reveal(el) { el.classList.add('in'); }

  function sleep(ms) {
    return new Promise(resolve => {
      const t = setTimeout(resolve, ms);
      timers.push(t);
    });
  }

  function resetAll() {
    clearAll();
    hLine.setAttribute('stroke-dashoffset', '1');
    uLine.setAttribute('stroke-dashoffset', '1');
    [thisIs, brandName, brandSub, guideLine, ctaMain, ctaSub].forEach(el => el.classList.remove('in'));
    linkCallout.classList.remove('stamped');
    linkCallout.style.opacity = '0';
    stage.classList.add('prep');
    void stage.offsetWidth;
    stage.classList.remove('prep');
  }

  // ============================================================
  // Timeline (~12.0s) synced to VO:
  // 0.0–0.6  : header line draws
  // 0.6–1.0  : "THIS IS" label
  //            VO: "This is..."
  // 1.0–1.8  : "Law Firm Lawyeon" brand reveal (rise + scale)
  // 1.8–2.4  : "VISA & IMMIGRATION CENTER" subtitle
  // 2.4–3.0  : red underline beneath brand
  //            [end of VO sentence 1]
  // 3.0–4.2  : "Full guide: how to start a business in Korea"
  //            VO: "Full guide on how to start a business in Korea —"
  // 4.2–5.0  : "-> LINK IN BIO" callout stamps in
  //            VO: "— link in bio."
  // 5.0–7.0  : FREE PRE-CONSULTATION main line
  //            VO: "Free pre-consultation available."
  // 7.0–8.0  : AVAILABLE accent
  // 8.0–12.0 : tail hold for outro breathing room
  // ============================================================
  async function play() {
    resetAll();

    await drawLine(hLine, 600, t => 1 - Math.pow(1 - t, 2));

    reveal(thisIs);
    await sleep(400);

    reveal(brandName);
    await sleep(800);

    reveal(brandSub);
    await sleep(600);

    await drawLine(uLine, 600, t => 1 - Math.pow(1 - t, 3));

    reveal(guideLine);
    await sleep(1200);

    linkCallout.classList.add('stamped');
    await sleep(800);

    reveal(ctaMain);
    await sleep(2000);

    reveal(ctaSub);
    await sleep(1000);

    // Tail hold to reach ~12s total
    await sleep(4000);
  }

  replayBtn.addEventListener('click', () => play());

  window.addEventListener('load', () => {
    requestAnimationFrame(() => requestAnimationFrame(play));
  });
})();
</script>

</body>
</html>
