<style>
.corp-page .corp-grid{display:grid;grid-template-columns:1fr 360px;gap:40px;padding:34px 0 80px;align-items:start}
.corp-page .field{margin-bottom:16px}
.corp-page .field label{display:block;font-size:13px;font-weight:600;color:var(--brown);margin-bottom:7px}
.corp-page .field label .req{color:#C0392B}
.corp-page .field input,.corp-page .field textarea{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);background:#fff;border:1.5px solid var(--rule-d);border-radius:3px;padding:12px 14px;transition:border-color .12s}
.corp-page .field input:focus,.corp-page .field textarea:focus{outline:none;border-color:var(--btn)}
.corp-page .field textarea{min-height:120px;resize:vertical}
.corp-page .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.corp-page .btn-block{width:100%;margin-top:6px;background:var(--btn);color:#fff;border:none;border-radius:3px;padding:15px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;transition:background .14s}
.corp-page .btn-block:hover:not(:disabled){background:var(--btn-d)}
.corp-page .btn-block:disabled{background:#CFC8BC;cursor:not-allowed}
.corp-page .corp-aside{position:sticky;top:96px;background:var(--card-2);border:1px solid var(--rule);border-radius:6px;padding:26px}
.corp-page .corp-aside h3{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:10px}
.corp-page .corp-aside p{font-size:13.5px;color:var(--muted);line-height:1.75;margin-bottom:14px}
.corp-page .corp-aside .ci{font-size:13.5px;color:var(--ink);line-height:1.8}
.corp-page .corp-aside .ci b{color:var(--brown);font-weight:600}
.corp-page .confirm{display:none;background:#fff;border:1.5px solid var(--btn);border-radius:4px;padding:20px;margin-top:16px}
.corp-page .confirm.show{display:block}
.corp-page .confirm .ttl{font-weight:700;color:var(--ink);margin-bottom:8px}
.corp-page .confirm p{font-size:13.5px;color:var(--muted);line-height:1.7}
@media(max-width:880px){.corp-page .corp-grid{grid-template-columns:1fr;gap:8px}.corp-page .corp-aside{position:static;margin-top:10px}}
@media(max-width:680px){.corp-page .two{grid-template-columns:1fr}}
</style>

<div class="corp-page">
<section class="page-head">
    <div class="wrap">
        <h1>기업 자문 문의</h1>
        <p class="lead">기업·기관의 외국인 임직원 비자, 출입국 규정 준수, 고용 관련 법률 사안에 대한 자문을 안내합니다. 아래 내용을 남겨 주시면 담당자가 영업일 기준 빠르게 연락드립니다. 별도의 회원가입은 필요하지 않습니다.</p>
    </div>
</section>

<div class="wrap">
    <div class="corp-grid">
        <div class="panel">
            <div class="two">
                <div class="field">
                    <label>이름 <span class="req">*</span></label>
                    <input type="text" id="cName" placeholder="홍길동" autocomplete="name">
                </div>
                <div class="field">
                    <label>회사·기관명</label>
                    <input type="text" id="cCompany" placeholder="(주)○○" autocomplete="organization">
                </div>
            </div>
            <div class="two">
                <div class="field">
                    <label>연락처 <span class="req">*</span></label>
                    <input type="tel" id="cPhone" placeholder="010-0000-0000" autocomplete="tel">
                </div>
                <div class="field">
                    <label>이메일</label>
                    <input type="email" id="cEmail" placeholder="name@company.com" autocomplete="email">
                </div>
            </div>
            <div class="field">
                <label>문의 내용</label>
                <textarea id="cMsg" placeholder="자문이 필요한 사안을 간단히 적어 주세요. (예: 외국인 임직원 E-7 비자, 사업장 단위 고용 규정 검토 등)"></textarea>
            </div>
            <div class="consent" style="margin:6px 0 16px">
                <label><input type="checkbox" id="consentChk"><span>서비스 이용약관 및 개인정보 처리방침에 동의하며, 기업 자문 문의 목적의 개인정보 수집·이용 및 제공에 동의합니다.</span></label>
                <div class="links">
                    <a href="__BASE__terms-of-service?v=2" target="_blank" rel="noopener">이용약관</a>
                    <a href="__BASE__privacy-policy?v=2" target="_blank" rel="noopener">개인정보 처리방침</a>
                </div>
            </div>
            <button class="btn-block" id="corpBtn" disabled>문의 보내기</button>
            <div class="confirm" id="confirm">
                <div class="ttl">문의가 접수되었습니다 ✓</div>
                <p id="confirmText"></p>
            </div>
        </div>

        <aside class="corp-aside">
            <h3>기업 자문 안내</h3>
            <p>외국인 임직원 채용·비자, 사업장 단위 출입국 규정 준수, 고용·계약 관련 자문을 제공합니다.</p>
            <div class="ci">
                <b>대표번호</b> +82-2-2039-0544<br>
                <b>서울</b> 강서구 공항대로 164, 류마타워 503호<br>
                <b>광주</b> 동구 준법로 1, 초석빌딩 3층
            </div>
        </aside>
    </div>
</div>
</div>

<script>
(function(){
    var STR = {
        cta:'문의 보내기', sending:'전송 중…', done:'문의 접수 완료',
        agree:'개인정보 수집·이용 및 제공에 동의해 주세요.',
        need:'이름과 연락처를 입력해 주세요.',
        err:'문의 전송에 실패했습니다. 다시 시도하시거나 02-2039-0544로 연락해 주세요.',
        confirm:function(name){ return name+'님, 기업 자문 문의가 접수되었습니다. 담당자가 입력하신 연락처로 곧 연락드리겠습니다.'; }
    };
    var name=document.getElementById('cName'), company=document.getElementById('cCompany'),
        phone=document.getElementById('cPhone'), email=document.getElementById('cEmail'),
        msg=document.getElementById('cMsg'), chk=document.getElementById('consentChk'),
        btn=document.getElementById('corpBtn');
    var submitting=false;
    function sync(){ btn.disabled = !(name.value.trim() && phone.value.trim() && chk.checked && !submitting); }
    [name,phone].forEach(function(i){ i.addEventListener('input', sync); });
    chk.addEventListener('change', sync);

    btn.addEventListener('click', async function(){
        if(submitting) return;
        if(!name.value.trim() || !phone.value.trim()){ alert(STR.need); return; }
        if(!chk.checked){ alert(STR.agree); return; }
        submitting=true; btn.disabled=true; btn.textContent=STR.sending;
        var payload={ name:name.value.trim(), company:company.value.trim(), phone:phone.value.trim(), email:email.value.trim(), message:msg.value.trim(), lang:'ko' };
        try{
            if(typeof createCorporateInquiry!=='function'){ throw new Error('backend not ready'); }
            var res=await createCorporateInquiry(payload);
            if(!res || !res.success){ throw new Error(res && res.error || 'save failed'); }
            document.getElementById('confirmText').textContent=STR.confirm(payload.name);
            document.getElementById('confirm').classList.add('show');
            btn.textContent=STR.done;
        }catch(e){ console.error(e); alert(STR.err); submitting=false; btn.textContent=STR.cta; sync(); }
    });
})();
</script>
