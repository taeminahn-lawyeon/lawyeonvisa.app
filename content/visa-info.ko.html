<style>
.vinfo .field{margin-bottom:16px}
.vinfo .field label{display:block;font-size:13px;font-weight:600;color:var(--brown);margin-bottom:7px}
.vinfo .field label .req{color:#C0392B}
.vinfo .field .opt{color:var(--muted);font-weight:500}
.vinfo .field input,.vinfo .field select{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);background:#fff;border:1.5px solid var(--rule-d);border-radius:3px;padding:12px 14px;transition:border-color .12s}
.vinfo .field input:focus,.vinfo .field select:focus{outline:none;border-color:var(--btn)}
.vinfo .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.vinfo .seg{display:flex;gap:10px}
.vinfo .seg label{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid var(--rule-d);border-radius:3px;padding:11px;cursor:pointer;font-size:14.5px;color:var(--ink);font-weight:500}
.vinfo .seg label.on{border-color:var(--btn);background:var(--card-2);font-weight:700}
.vinfo .seg input{display:none}
.vinfo .btn-block{width:100%;margin-top:6px;background:var(--btn);color:#fff;border:none;border-radius:3px;padding:15px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer}
.vinfo .btn-block:disabled{background:#CFC8BC;cursor:not-allowed}
.vinfo .gate{background:var(--card-2);border:1px solid var(--rule);border-radius:8px;padding:24px;text-align:center}
.vinfo .gate .btn{margin-top:14px}
@media(max-width:680px){.vinfo .two{grid-template-columns:1fr}}
</style>

<section class="page-head">
    <div class="wrap">
        <h1>비자 정보 제출</h1>
        <p class="lead">체류 상태 확인과 상담·업무 처리를 위해 기본 정보를 남겨 주세요. 입력하신 정보는 마이 페이지에서 확인·수정하실 수 있습니다.</p>
    </div>
</section>

<div class="wrap" style="padding:8px 0 80px;max-width:760px">
    <div class="vinfo">
        <div class="gate" id="loginGate" style="display:none">
            <div style="font-weight:700;color:var(--ink);font-size:16px;margin-bottom:6px">로그인이 필요합니다</div>
            <p style="color:var(--muted);font-size:14px;line-height:1.7">비자 정보를 제출하려면 먼저 로그인(회원가입)해 주세요.</p>
            <button class="btn btn-primary" id="gateLogin">Google 계정으로 계속하기</button>
        </div>

        <div class="panel" id="form" style="display:none">
            <div class="two">
                <div class="field">
                    <label>성(Last name) <span class="req">*</span></label>
                    <input type="text" id="lastName" placeholder="Smith" autocomplete="family-name">
                </div>
                <div class="field">
                    <label>이름(First name) <span class="req">*</span></label>
                    <input type="text" id="firstName" placeholder="John" autocomplete="given-name">
                </div>
            </div>
            <div class="two">
                <div class="field">
                    <label>생년월일 <span class="req">*</span></label>
                    <input type="date" id="birthDate">
                </div>
                <div class="field">
                    <label>연락처 <span class="req">*</span></label>
                    <input type="tel" id="phone" placeholder="010-0000-0000" autocomplete="tel">
                </div>
            </div>
            <div class="field">
                <label>국적 <span class="req">*</span></label>
                <select id="nationality"><option value="" selected>국가를 선택하세요</option></select>
            </div>

            <div class="field">
                <label>현재 한국에 체류 중이신가요? <span class="req">*</span></label>
                <div class="seg" id="inKoreaSeg">
                    <label data-v="yes"><input type="radio" name="inKorea" value="yes">예, 국내 체류 중</label>
                    <label data-v="no"><input type="radio" name="inKorea" value="no">아니오, 국외 체류</label>
                </div>
            </div>

            <div id="visaFields" style="display:none">
                <div class="two">
                    <div class="field">
                        <label>체류 자격(비자) <span class="req">*</span></label>
                        <select id="visaType">
                            <option value="" selected>선택하세요</option>
                            <option>C-3 단기방문</option><option>D-2 유학</option><option>D-4 일반연수</option>
                            <option>D-8 기업투자</option><option>D-9 무역경영</option><option>D-10 구직</option>
                            <option>E-7 특정활동</option><option>E-9 비전문취업</option><option>F-2 거주</option>
                            <option>F-4 재외동포</option><option>F-5 영주</option><option>F-6 결혼이민</option>
                            <option>H-2 방문취업</option><option>기타</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>체류 만료일 <span class="req">*</span></label>
                        <input type="date" id="visaExpiry">
                    </div>
                </div>
                <div class="field">
                    <label>외국인등록번호 <span class="opt">(선택)</span></label>
                    <input type="text" id="foreignerNumber" placeholder="000000-0000000">
                </div>
                <div class="field">
                    <label>주소 <span class="opt">(선택)</span></label>
                    <input type="text" id="address" placeholder="도로명 주소">
                </div>
            </div>

            <div id="countryField" class="field" style="display:none">
                <label>현재 체류 국가 <span class="req">*</span></label>
                <select id="country"><option value="" selected>국가를 선택하세요</option></select>
            </div>

            <div class="consent" style="margin:6px 0 16px">
                <label><input type="checkbox" id="consentChk"><span>개인정보 수집·이용 및 제공에 동의합니다.</span></label>
                <div class="links">
                    <a href="__BASE__terms-of-service?v=2" target="_blank" rel="noopener">이용약관</a>
                    <a href="__BASE__privacy-policy?v=2" target="_blank" rel="noopener">개인정보 처리방침</a>
                </div>
            </div>
            <button class="btn-block" id="saveBtn" disabled>저장하기</button>
        </div>
    </div>
</div>

<script src="__BASE__js/countries.js?v=1"></script>
<script>
(function(){
    var LANG='ko';
    var loginGate=document.getElementById('loginGate'), form=document.getElementById('form');
    var lastName=document.getElementById('lastName'), firstName=document.getElementById('firstName'),
        birthDate=document.getElementById('birthDate'), phone=document.getElementById('phone'),
        nationality=document.getElementById('nationality'), visaType=document.getElementById('visaType'),
        visaExpiry=document.getElementById('visaExpiry'), foreignerNumber=document.getElementById('foreignerNumber'),
        address=document.getElementById('address'), country=document.getElementById('country'),
        chk=document.getElementById('consentChk'), saveBtn=document.getElementById('saveBtn');
    var visaFields=document.getElementById('visaFields'), countryField=document.getElementById('countryField'),
        seg=document.getElementById('inKoreaSeg');
    var inKorea=null, user=null, saving=false;

    if(window.countryOptions){
        nationality.innerHTML='<option value="" selected>국가를 선택하세요</option>'+window.countryOptions(LANG);
        country.innerHTML='<option value="" selected>국가를 선택하세요</option>'+window.countryOptions(LANG);
    }

    Array.prototype.forEach.call(seg.querySelectorAll('label'), function(l){
        l.addEventListener('click', function(){
            inKorea=l.getAttribute('data-v')==='yes';
            Array.prototype.forEach.call(seg.querySelectorAll('label'), function(x){ x.classList.remove('on'); });
            l.classList.add('on'); l.querySelector('input').checked=true;
            visaFields.style.display=inKorea?'':'none'; countryField.style.display=inKorea?'none':'';
            sync();
        });
    });

    function sync(){
        var base = lastName.value.trim() && firstName.value.trim() && birthDate.value && phone.value.trim() && nationality.value && inKorea!==null && chk.checked && !saving;
        var detail = inKorea===null ? false : (inKorea ? (visaType.value && visaExpiry.value) : !!country.value);
        saveBtn.disabled = !(base && detail);
    }
    [lastName,firstName,phone].forEach(function(i){ i.addEventListener('input', sync); });
    [birthDate,nationality,visaType,visaExpiry,country].forEach(function(i){ i.addEventListener('change', sync); });
    chk.addEventListener('change', sync);

    document.getElementById('gateLogin').addEventListener('click', function(){ if(typeof signInWithGoogle==='function') signInWithGoogle(); });

    saveBtn.addEventListener('click', async function(){
        if(saving) return; saving=true; saveBtn.disabled=true; saveBtn.textContent='저장 중…';
        try{
            var uid=user.id;
            try{ await createUserProfile(uid, {
                name: lastName.value.trim()+' '+firstName.value.trim(),
                email: user.email||'', phone: phone.value.trim(),
                nationality: nationality.value, birth_date: birthDate.value,
                visa_type: inKorea ? (visaType.value||null) : null,
                visa_expiry_date: inKorea ? (visaExpiry.value||null) : null,
                passport_number: inKorea ? (foreignerNumber.value.trim()||null) : null,
                address: inKorea ? (address.value.trim()||null) : null
            }); }catch(_){}
            try{ await createUserProfile(uid, { is_in_korea: inKorea, country: inKorea ? null : (country.value||null) }); }catch(_){}
            window.location.href='__BASE__mypage';
        }catch(e){ console.error(e); alert('저장에 실패했습니다. 다시 시도해 주세요.'); saving=false; saveBtn.textContent='저장하기'; sync(); }
    });

    function prefill(p){
        if(!p) return;
        if(p.name){ var parts=String(p.name).trim().split(' '); if(parts.length>1){ lastName.value=parts[0]; firstName.value=parts.slice(1).join(' '); } else { firstName.value=p.name; } }
        if(p.phone) phone.value=p.phone;
        if(p.birth_date) birthDate.value=p.birth_date;
        if(p.nationality) nationality.value=p.nationality;
        if(p.visa_type) visaType.value=p.visa_type;
        if(p.visa_expiry_date) visaExpiry.value=p.visa_expiry_date;
        if(p.passport_number) foreignerNumber.value=p.passport_number;
        if(p.address) address.value=p.address;
        if(p.country) country.value=p.country;
        if(p.is_in_korea===true || p.is_in_korea===false){
            inKorea=p.is_in_korea;
            Array.prototype.forEach.call(seg.querySelectorAll('label'), function(x){ x.classList.toggle('on', x.getAttribute('data-v')===(inKorea?'yes':'no')); });
            visaFields.style.display=inKorea?'':'none'; countryField.style.display=inKorea?'none':'';
        }
    }

    document.addEventListener('DOMContentLoaded', async function(){
        if(typeof checkSession!=='function'){ loginGate.style.display=''; return; }
        var s=await checkSession();
        if(!s||!s.user){ loginGate.style.display=''; form.style.display='none'; return; }
        user=s.user; loginGate.style.display='none'; form.style.display='';
        try{ var pr=await getUserProfile(user.id); if(pr&&pr.success) prefill(pr.data); }catch(_){}
        sync();
    });
})();
</script>
