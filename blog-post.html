    <script>
        // 이전 slug → 새 slug 리디렉션 맵 (SEO용)
        const SLUG_REDIRECTS = {
            'd10-1-visa-korea-no-points-exemption-guide': 'd10-visa-korea-new-graduate-points-exemption-guide-2026'
        };

        // 정적 파일이 있으면 리다이렉트, 없으면 기존 방식으로 동작
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let slug = urlParams.get('slug');

            if (!slug) {
                // slug가 없으면 블로그 목록으로
                window.location.replace('/blog.html');
                return;
            }

            // 이전 slug인 경우 새 slug로 301 리디렉션
            if (SLUG_REDIRECTS[slug]) {
                window.location.replace('/blog/' + SLUG_REDIRECTS[slug] + '.html');
                return;
            }

            // 정적 파일 존재 여부 확인
            fetch('/blog/' + slug + '.html', { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        // 정적 파일 있으면 리다이렉트
                        window.location.replace('/blog/' + slug + '.html');
                    }
                    // 없으면 기존 Supabase 방식으로 로드 (아래 코드 실행)
                })
                .catch(() => {
                    // 에러시 기존 방식 유지
                });
        })();
    </script>

        // Supabase 초기화 (리다이렉트 후에는 이 코드 실행 안됨)
        const SUPABASE_URL = 'https://gqistzsergddnpcvuzba.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxaXN0enNlcmdkZG5wY3Z1emJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxNTEyMjEsImV4cCI6MjA4MDcyNzIyMX0.X_GgShObq9OJ6z7aEKdUCoyHYo-OJL-I5hcIDt4komg';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // i18n 헬퍼 함수
        function t(key, fallback) {
            if (typeof i18n !== 'undefined' && i18n.translate) {
                const result = i18n.translate(key);
                return result !== key ? result : (fallback || key);
            }
            return fallback || key;
        }

        // 카테고리 매핑 (동적 번역)
        function getCategoryName(cat) {
            const map = {
                'citizenship': t('blog.category.citizenship', '국적·귀화·난민'),
                'admin': t('blog.category.admin', '공통 행정 신고'),
                'work': t('blog.category.work', '취업·워크'),
                'education': t('blog.category.education', '교육·구직'),
                'business': t('blog.category.business', '사업·투자'),
                'family': t('blog.category.family', '동포·가족·결혼'),
                'residence': t('blog.category.residence', '거주·영주')
            };
            return map[cat] || cat;
        }
        const categoryNames = {
            'citizenship': '국적·귀화·난민',
            'admin': '공통 행정 신고',
            'work': '취업·워크',
            'education': '교육·구직',
            'business': '사업·투자',
            'family': '동포·가족·결혼',
            'residence': '거주·영주'
        };

        // URL에서 slug 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        // 글 로드
        async function loadPost() {
            if (!slug) {
                window.location.href = 'blog.html';
                return;
            }

            try {
                const { data: post, error } = await supabaseClient
                    .from('blog_posts')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error || !post) {
                    document.getElementById('mainContent').innerHTML = `
                        <div class="article" style="grid-column: 1 / -1; text-align: center; padding: 100px 24px;">
                            <h2 style="margin-bottom: 16px;">${t('blog.post.notFound.title', '글을 찾을 수 없습니다')}</h2>
                            <p style="color: #8b95a1; margin-bottom: 24px;">${t('blog.post.notFound.desc', '요청하신 글이 존재하지 않거나 삭제되었습니다.')}</p>
                            <a href="blog.html" class="back-to-list">← ${t('blog.post.backToList', '목록으로 돌아가기')}</a>
                        </div>
                    `;
                    return;
                }

                // 페이지 타이틀 업데이트
                document.title = `${post.title} | 법무법인 로연`;

                // SEO 메타 태그 및 Schema.org 업데이트
                updateSEOMetaTags(post);

                // 목차 생성
                const toc = generateTOC(post.content);

                // 관련 서비스 버튼 생성
                const relatedServices = post.related_services ? JSON.parse(post.related_services) : [];

                // CTA 텍스트 (다국어 지원)
                const ctaText = {
                    apply: t('blog.post.ctaApply', '신청하기'),
                    midQ: t('blog.post.ctaMidQ', '대행 서비스가 필요하신가요?'),
                    midBtn: t('blog.post.ctaMidBtn', '신청하기 →'),
                    bottomTitle: t('blog.post.relatedServices', '관련 서비스 신청'),
                    bottomDesc: t('blog.post.relatedServicesDesc', '전문가의 도움이 필요하신가요? 지금 바로 서비스를 신청하세요.')
                };

                // 메인 콘텐츠 렌더링
                document.getElementById('mainContent').innerHTML = `
                    <article class="article">
                        <!-- 모바일 목차 토글 -->
                        <button class="mobile-toc-toggle" onclick="toggleMobileToc()">
                            <span>📑</span>
                            <span>${t('blog.post.tocToggle', '목차 보기')}</span>
                        </button>
                        <div class="mobile-toc" id="mobileToc">
                            <div class="toc-title">${t('blog.post.toc', '목차')}</div>
                            <ul class="toc-list">${toc.html}</ul>
                        </div>

                        <header class="article-header">
                            <span class="article-category">${getCategoryName(post.category)}</span>
                            <h1 class="article-title">${post.title}</h1>
                            <div class="article-meta">
                                <span class="article-meta-item">
                                    <span>📅</span>
                                    <span>${formatDate(post.created_at)}</span>
                                </span>
                                ${post.updated_at !== post.created_at ? `
                                    <span class="article-meta-item">
                                        <span>${t('blog.post.modified', '수정')}:</span>
                                        <span>${formatDate(post.updated_at)}</span>
                                    </span>
                                ` : ''}
                            </div>
                            <div class="share-buttons">
                                <button class="share-btn" onclick="copyLink()">
                                    <span>🔗</span>
                                    <span>${t('blog.post.shareLink', '링크 복사')}</span>
                                </button>
                                ${relatedServices.length > 0 ? `
                                <a href="/service-apply-general.html?service=${relatedServices[0].id}" class="header-cta-btn">
                                    <span>${relatedServices[0].name} ${ctaText.apply}</span>
                                    <span class="arrow">→</span>
                                </a>` : ''}
                            </div>
                        </header>

                        <div class="article-content">
                            ${renderContent(post.content, relatedServices, ctaText)}
                        </div>

                        <!-- 서비스 CTA -->
                        <div class="service-cta-section">
                            <div class="service-cta-title">${t('blog.post.relatedServices', '관련 서비스 신청')}</div>
                            <div class="service-cta-desc">${t('blog.post.relatedServicesDesc', '전문가의 도움이 필요하신가요? 지금 바로 서비스를 신청하세요.')}</div>
                            <div class="service-cta-buttons" id="serviceCTAButtons">
                                ${renderServiceButtons(relatedServices, ctaText)}
                            </div>
                        </div>

                        <!-- 관련 글 -->
                        <div class="related-posts" id="relatedPosts">
                            <div class="loading-spinner"></div>
                        </div>

                        <a href="blog.html" class="back-to-list">← ${t('blog.post.backToList', '목록으로 돌아가기')}</a>
                    </article>

                    <aside class="sidebar">
                        <nav class="toc">
                            <div class="toc-title">${t('blog.post.toc', '목차')}</div>
                            <ul class="toc-list" id="tocList">${toc.html}</ul>
                        </nav>
                    </aside>
                `;

                // 관련 글 로드
                loadRelatedPosts(post.category, post.id);

                // 목차 스크롤 하이라이트
                setupTocHighlight();

            } catch (error) {
                console.error('Error loading post:', error);
            }
        }

        // 목차 생성
        function generateTOC(content) {
            const headings = [];
            const regex = /<h2[^>]*id="([^"]*)"[^>]*>([^<]*)<\/h2>/gi;
            let match;

            // content가 블록 형식인 경우
            try {
                const blocks = JSON.parse(content);
                blocks.forEach((block, index) => {
                    if (block.type === 'heading' || block.type === 'numbered-section') {
                        const id = `section-${index}`;
                        headings.push({ id, title: block.title || block.content });
                    }
                });
            } catch {
                // HTML 형식인 경우
                while ((match = regex.exec(content)) !== null) {
                    headings.push({ id: match[1], title: match[2] });
                }
            }

            const html = headings.map(h => `
                <li class="toc-item">
                    <a href="#${h.id}" class="toc-link" data-id="${h.id}">${h.title}</a>
                </li>
            `).join('');

            return { headings, html };
        }

        // 콘텐츠 렌더링
        function renderContent(content, services, cta) {
            try {
                const blocks = JSON.parse(content);
                const hasLinkButton = blocks.some(b => b.type === 'link-button');
                const midIndex = Math.floor(blocks.length / 2);
                const service = (services && services.length > 0) ? services[0] : null;
                const insertMidCTA = service && !hasLinkButton && blocks.length >= 6;

                return blocks.map((block, index) => {
                    let html = renderBlock(block, index);
                    if (insertMidCTA && index === midIndex) {
                        html += `
                            <div class="mid-cta-banner">
                                <div class="mid-cta-text"><strong>${service.name}</strong> — ${cta.midQ}</div>
                                <a href="/service-apply-general.html?service=${service.id}" class="mid-cta-link">
                                    ${cta.midBtn}
                                </a>
                            </div>
                        `;
                    }
                    return html;
                }).join('');
            } catch {
                // HTML 형식인 경우 그대로 반환
                return content;
            }
        }

        // 블록 렌더링
        function renderBlock(block, index) {
            switch (block.type) {
                case 'heading':
                    return `<h2 id="section-${index}">${block.content}</h2>`;

                case 'paragraph':
                    return `<p>${block.content}</p>`;

                case 'numbered-section':
                    return `
                        <div class="block-numbered-section" id="section-${index}">
                            <div class="number-badge">${block.number}</div>
                            <div class="section-content">
                                <div class="section-title">${block.title}</div>
                                <div class="section-text">${block.content}</div>
                            </div>
                        </div>
                    `;

                case 'table':
                    return `
                        <div class="block-table">
                            <table>
                                <thead>
                                    <tr>${block.headers.map(h => `<th>${h}</th>`).join('')}</tr>
                                </thead>
                                <tbody>
                                    ${block.rows.map(row => `
                                        <tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;

                case 'info-box':
                    const icons = { info: 'ℹ️', warning: '⚠️', danger: '🚨', success: '✅' };
                    return `
                        <div class="block-info-box ${block.style || 'info'}">
                            <span class="block-info-box-icon">${icons[block.style] || 'ℹ️'}</span>
                            <div class="block-info-box-content">${block.content}</div>
                        </div>
                    `;

                case 'link-button':
                    return `
                        <a href="${block.url}" class="block-link-button" target="_blank">
                            ${block.text} →
                        </a>
                    `;

                case 'image':
                    return `
                        <figure class="block-image">
                            <img src="${block.url}" alt="${block.alt || ''}">
                            ${block.caption ? `<figcaption class="block-image-caption">${block.caption}</figcaption>` : ''}
                        </figure>
                    `;

                case 'list':
                    const tag = block.ordered ? 'ol' : 'ul';
                    return `<${tag}>${block.items.map(item => `<li>${item}</li>`).join('')}</${tag}>`;

                default:
                    return `<p>${block.content || ''}</p>`;
            }
        }

        // 서비스 버튼 렌더링
        function renderServiceButtons(services, cta) {
            if (!services || services.length === 0) {
                return `
                    <a href="/index.html#services" class="service-cta-btn">
                        <span>${t('blog.post.browseServices', '서비스 둘러보기')}</span>
                        <span class="arrow">→</span>
                    </a>
                `;
            }

            return services.map(service => `
                <a href="/service-apply-general.html?service=${service.id}" class="service-cta-btn">
                    <span>${service.name} ${cta.apply}</span>
                    <span class="arrow">→</span>
                </a>
            `).join('');
        }

        // 관련 글 로드
        async function loadRelatedPosts(category, currentId) {
            try {
                const { data: posts, error } = await supabaseClient
                    .from('blog_posts')
                    .select('*')
                    .eq('category', category)
                    .neq('id', currentId)
                    .order('created_at', { ascending: false })
                    .limit(4);

                const container = document.getElementById('relatedPosts');

                if (!posts || posts.length === 0) {
                    container.style.display = 'none';
                    return;
                }

                const emojis = { 'citizenship': '🛂', 'admin': '📋', 'work': '💼', 'education': '🎓', 'business': '🏢', 'family': '👨‍👩‍👧', 'residence': '🏠' };

                container.innerHTML = `
                    <h3 class="related-posts-title">${t('blog.post.relatedPosts', '관련 글')}</h3>
                    <div class="related-posts-grid">
                        ${posts.map(post => `
                            <a href="blog-post.html?slug=${post.slug}" class="related-post-card">
                                <div class="related-post-thumb">
                                    ${post.thumbnail_url
                                        ? `<img src="${post.thumbnail_url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`
                                        : emojis[post.category] || '📄'
                                    }
                                </div>
                                <div class="related-post-content">
                                    <div class="related-post-category">${getCategoryName(post.category)}</div>
                                    <div class="related-post-title">${post.title}</div>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                `;

            } catch (error) {
                console.error('Error loading related posts:', error);
            }
        }

        // 목차 하이라이트
        function setupTocHighlight() {
            const tocLinks = document.querySelectorAll('.toc-link');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        tocLinks.forEach(link => {
                            link.classList.toggle('active', link.dataset.id === id);
                        });
                    }
                });
            }, { rootMargin: '-80px 0px -80% 0px' });

            document.querySelectorAll('[id^="section-"]').forEach(section => {
                observer.observe(section);
            });
        }

        // 모바일 목차 토글
        function toggleMobileToc() {
            document.getElementById('mobileToc').classList.toggle('show');
        }

        // 링크 복사
        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert(t('blog.post.linkCopied', '링크가 복사되었습니다.'));
            });
        }

        // 날짜 포맷
        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
        }

        // SEO 메타 태그 및 Schema.org 업데이트
        function updateSEOMetaTags(post) {
            const pageUrl = `https://www.lawyeonvisa.app/blog-post.html?slug=${post.slug}`;
            const description = post.excerpt || post.title;
            const imageUrl = post.featured_image || '';
            const publishDate = new Date(post.created_at).toISOString();
            const modifiedDate = new Date(post.updated_at || post.created_at).toISOString();

            // 메타 태그 업데이트
            document.getElementById('meta-description').setAttribute('content', description);
            document.getElementById('canonical-url').setAttribute('href', pageUrl);

            // Open Graph 업데이트
            document.getElementById('og-title').setAttribute('content', `${post.title} | 법무법인 로연`);
            document.getElementById('og-description').setAttribute('content', description);
            document.getElementById('og-url').setAttribute('content', pageUrl);
            if (imageUrl) {
                document.getElementById('og-image').setAttribute('content', imageUrl);
            }

            // Twitter Card 업데이트
            document.getElementById('twitter-title').setAttribute('content', `${post.title} | 법무법인 로연`);
            document.getElementById('twitter-description').setAttribute('content', description);
            if (imageUrl) {
                document.getElementById('twitter-image').setAttribute('content', imageUrl);
            }

            // Schema.org 구조화 데이터 업데이트
            const schemaData = {
                "@context": "https://schema.org",
                "@type": "Article",
                "headline": post.title,
                "description": description,
                "image": imageUrl,
                "author": {
                    "@type": "Organization",
                    "name": "법무법인 로연 출입국이민지원센터",
                    "url": "https://www.lawyeonvisa.app"
                },
                "publisher": {
                    "@type": "Organization",
                    "name": "법무법인 로연",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://www.lawyeonvisa.app/images/logo.png"
                    }
                },
                "datePublished": publishDate,
                "dateModified": modifiedDate,
                "mainEntityOfPage": {
                    "@type": "WebPage",
                    "@id": pageUrl
                }
            };
            document.getElementById('schema-article').textContent = JSON.stringify(schemaData);
        }

        // 초기 로드
        loadPost();
    </script>
    <script>
        // 본문 드래그·복사·우클릭 억제 (기존 article 요소에 DOM 붙자마자 리스너 연결)
        (function() {
            function bind() {
                var root = document.querySelector('.article');
                if (!root) return setTimeout(bind, 200);
                ['contextmenu', 'copy', 'cut', 'dragstart', 'selectstart'].forEach(function(ev) {
                    root.addEventListener(ev, function(e) {
                        var t = e.target;
                        // CTA/버튼/링크/입력은 예외 — 사용자 상호작용 보존
                        if (t.closest && t.closest('button, a, input, textarea, .header-cta-btn, .share-btn')) return;
                        e.preventDefault();
                    }, { passive: false });
                });
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bind);
            } else {
                bind();
            }
        })();
    </script>
</body>
