<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Law Firm Lawyeon</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@700;900&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/site.css">
<style>
  .nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
  .nf .code{font-size:clamp(64px,12vw,120px);font-weight:800;line-height:1;color:var(--ink);letter-spacing:-.04em}
  .nf .bar{width:40px;height:3px;background:var(--btn);margin:22px 0 24px}
  .nf h1{font-size:clamp(18px,2.4vw,24px);font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .nf p{font-size:15px;color:var(--muted);margin-top:12px;line-height:1.7;max-width:460px}
  .nf .links{margin-top:30px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
  <div class="nf">
    <div class="code">404</div>
    <div class="bar"></div>
    <h1>Page not found · 페이지를 찾을 수 없습니다</h1>
    <p>The page you’re looking for may have moved or no longer exists.<br>요청하신 페이지가 이동되었거나 존재하지 않습니다.</p>
    <div class="links">
      <a href="/main" class="btn btn-primary">Home</a>
      <a href="/ko/main" class="btn btn-line">한국어 홈</a>
    </div>
  </div>
</body>
</html>
